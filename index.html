<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问渠 - 生活中的智慧锦囊</title>
<meta name="description" content="问渠——生活中的智慧锦囊。运势抽签、成语接龙、房贷计算、诗词壁纸，一个页面全搞定。">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0c18">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%231a1a2e'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%23e8c96a'>渠</text></svg>">
<style>
/* ═══════════════════════════════════════════
   字体 & 变量
═══════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');

:root {
  --bg: #08080f;
  --bg2: #0d0d1a;
  --card: rgba(20, 20, 38, 0.65);
  --card-hover: rgba(28, 28, 52, 0.85);
  --border: rgba(232, 201, 106, 0.15);
  --border-hover: rgba(232, 201, 106, 0.45);
  --gold: #e8c96a;
  --gold2: #c9a84c;
  --gold-pale: #f5e6b0;
  --text: #ede8df;
  --text2: #8a8070;
  --text3: #5a5448;
  --blue: #4a9eff;
  --shadow: rgba(232, 201, 106, 0.08);
  --glass-blur: blur(20px) saturate(180%);
}

/* ═══════════════════════════════════════════
   全局重置 & 背景
═══════════════════════════════════════════ */
*,*::before,*::after { margin: 0; padding: 0; box-sizing: border-box }

html { scroll-behavior: smooth }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── 动态背景 ── */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.bg-gradient {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232, 201, 106, 0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(74, 158, 255, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 10% 60%, rgba(232, 168, 76, 0.04) 0%, transparent 50%),
    linear-gradient(180deg, #08080f 0%, #0d0d1a 50%, #080810 100%);
}

.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(232, 201, 106, 0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232, 201, 106, 0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, black 0%, transparent 70%);
}

.bg-float {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.4;
  animation: floatUp 20s ease-in-out infinite;
}
.bg-float:nth-child(1) {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(232, 201, 106, 0.12), transparent 70%);
  top: 10%; left: -5%;
  animation-duration: 25s;
}
.bg-float:nth-child(2) {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(74, 158, 255, 0.08), transparent 70%);
  top: 50%; right: -5%;
  animation-duration: 18s; animation-delay: -7s;
}
.bg-float:nth-child(3) {
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(232, 168, 76, 0.1), transparent 70%);
  bottom: 15%; left: 30%;
  animation-duration: 22s; animation-delay: -12s;
}
@keyframes floatUp {
  0%, 100% { transform: translateY(0) scale(1); }
  33% { transform: translateY(-30px) scale(1.05); }
  66% { transform: translateY(15px) scale(0.95); }
}

/* 水滴漂浮动画 */
.bg-drops { position: absolute; inset: 0; }
.drop {
  position: absolute;
  width: 3px; height: 3px;
  background: rgba(232, 201, 106, 0.3);
  border-radius: 50%;
  animation: dropFall linear infinite;
}
@keyframes dropFall {
  0% { transform: translateY(-20px); opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 0.5; }
  100% { transform: translateY(100vh); opacity: 0; }
}

/* ═══════════════════════════════════════════
   页面结构
═══════════════════════════════════════════ */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  text-align: center;
  padding: 72px 20px 56px;
  position: relative;
}

/* 装饰光圈 */
.header::before {
  content: '';
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 280px;
  height: 280px;
  background: radial-gradient(circle, rgba(232, 201, 106, 0.1) 0%, transparent 70%);
  pointer-events: none;
  animation: pulseGlow 4s ease-in-out infinite;
}
@keyframes pulseGlow {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
}

.logo {
  font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
  font-size: clamp(3.5rem, 8vw, 6rem);
  font-weight: 700;
  letter-spacing: 0.12em;
  background: linear-gradient(135deg, var(--gold-pale) 0%, var(--gold) 40%, var(--gold2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  display: inline-block;
  animation: logoFloat 6s ease-in-out infinite;
  text-shadow: none;
  filter: drop-shadow(0 0 30px rgba(232, 201, 106, 0.3));
}
@keyframes logoFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.logo-en {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.68rem;
  letter-spacing: 0.55em;
  color: var(--text3);
  text-transform: uppercase;
  margin-top: 4px;
  margin-bottom: 20px;
}

.divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 20px;
  opacity: 0.6;
}

.quote {
  font-size: 0.88rem;
  color: var(--text2);
  font-style: italic;
  max-width: 400px;
  margin: 0 auto;
  line-height: 1.8;
  opacity: 0.8;
}

/* ── 标签导航 ── */
.section-label {
  max-width: 900px;
  margin: 0 auto 24px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.section-label span {
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text3);
  white-space: nowrap;
}
.section-label::before, .section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}

/* ── 功能卡片网格 ── */
.nav {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
}

.card {
  position: relative;
  background: var(--card);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  animation: cardIn 0.6s ease-out both;
}

/* 入场动画，错开每张卡片 */
.card:nth-child(1) { animation-delay: 0.05s }
.card:nth-child(2) { animation-delay: 0.1s }
.card:nth-child(3) { animation-delay: 0.15s }
.card:nth-child(4) { animation-delay: 0.2s }
.card:nth-child(5) { animation-delay: 0.25s }
.card:nth-child(6) { animation-delay: 0.3s }
.card:nth-child(7) { animation-delay: 0.35s }
.card:nth-child(8) { animation-delay: 0.4s }
.card:nth-child(9) { animation-delay: 0.45s }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 顶部光条 */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--card-gold, var(--gold)) 30%, var(--card-gold, var(--gold)) 70%, transparent 100%);
  opacity: 0;
  transition: opacity 0.4s;
}

/* 悬停光晕 */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background: radial-gradient(ellipse 60% 60% at 30% 30%, rgba(232, 201, 106, 0.05), transparent);
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}

.card:hover {
  transform: translateY(-6px);
  background: var(--card-hover);
  border-color: var(--border-hover);
  box-shadow:
    0 20px 60px rgba(232, 201, 106, 0.12),
    0 8px 24px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(232, 201, 106, 0.1);
}
.card:hover::before { opacity: 0.8; }
.card:hover::after { opacity: 1; }

/* 卡片图标容器 */
.card-icon-wrap {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  margin-bottom: 16px;
  position: relative;
  background: rgba(232, 201, 106, 0.06);
  border: 1px solid rgba(232, 201, 106, 0.1);
  transition: all 0.3s;
}
.card:hover .card-icon-wrap {
  transform: scale(1.08);
  background: rgba(232, 201, 106, 0.1);
  box-shadow: 0 0 24px rgba(232, 201, 106, 0.15);
}

/* 角标 */
.card-badge {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 0.62rem;
  padding: 3px 9px;
  border-radius: 20px;
  background: rgba(232, 201, 106, 0.12);
  color: var(--gold);
  border: 1px solid rgba(232, 201, 106, 0.25);
  letter-spacing: 0.05em;
}

.card-title {
  font-size: 1.05rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
  letter-spacing: 0.02em;
}

.card-desc {
  font-size: 0.78rem;
  color: var(--text2);
  line-height: 1.6;
}

.card-arrow {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-size: 0.8rem;
  color: var(--text3);
  transition: all 0.3s;
  opacity: 0;
  transform: translateX(-6px);
}
.card:hover .card-arrow {
  opacity: 1;
  transform: translateX(0);
  color: var(--gold);
}

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 40px 20px;
  font-size: 0.72rem;
  color: var(--text3);
  letter-spacing: 0.1em;
  position: relative;
  z-index: 1;
}
.footer::before {
  content: '';
  display: block;
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 0 auto 20px;
}

/* ═══════════════════════════════════════════
   模态框
═══════════════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(4, 4, 10, 0.88);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.active { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: rgba(14, 14, 26, 0.95);
  backdrop-filter: blur(30px) saturate(150%);
  -webkit-backdrop-filter: blur(30px) saturate(150%);
  border: 1px solid rgba(232, 201, 106, 0.12);
  border-radius: 24px;
  width: 100%;
  max-width: 680px;
  max-height: 88vh;
  overflow-y: auto;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(232, 201, 106, 0.05),
    0 40px 100px rgba(0, 0, 0, 0.6),
    0 0 60px rgba(232, 201, 106, 0.04);
  animation: slideUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-track { background: transparent; }
.modal::-webkit-scrollbar-thumb { background: rgba(232, 201, 106, 0.2); border-radius: 2px; }

.modal-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid rgba(232, 201, 106, 0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: rgba(14, 14, 26, 0.95);
  backdrop-filter: blur(20px);
  z-index: 10;
  border-radius: 24px 24px 0 0;
}

.modal-title {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}
.modal-title-icon { font-size: 1.3rem; }

.modal-close {
  background: rgba(232, 201, 106, 0.08);
  border: 1px solid rgba(232, 201, 106, 0.12);
  color: var(--text2);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 10px;
  line-height: 1;
  transition: all 0.2s;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover {
  background: rgba(232, 201, 106, 0.15);
  color: var(--gold);
  border-color: rgba(232, 201, 106, 0.25);
}

.modal-body {
  padding: 28px;
  animation: contentIn 0.3s ease 0.1s both;
}
@keyframes contentIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════
   功能页样式
═══════════════════════════════════════════ */

/* 通用 */
.body-center { text-align: center; padding: 10px 0; }
.body-note { font-size: 0.78rem; color: var(--text2); margin-bottom: 6px; }

/* ── 1. 轮盘抽签 ── */
.wheel-section { display: flex; flex-direction: column; align-items: center; }

.wheel-wrap {
  position: relative;
  width: 320px;
  height: 320px;
  margin: 16px auto;
  filter: drop-shadow(0 0 40px rgba(232, 201, 106, 0.15));
}

.wheel {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  transition: transform 4.5s cubic-bezier(0.2, 0.8, 0.3, 1);
  box-shadow:
    0 0 0 6px rgba(232, 201, 106, 0.2),
    0 0 0 10px rgba(232, 201, 106, 0.05),
    0 0 40px rgba(232, 201, 106, 0.1),
    inset 0 0 40px rgba(0, 0, 0, 0.3);
}

.wheel-seg {
  position: absolute;
  width: 50%;
  height: 50%;
  left: 50%;
  top: 0;
  transform-origin: 0 160px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 22px;
  font-size: 0.7rem;
  color: rgba(255, 255, 255, 0.95);
  text-align: right;
  line-height: 1.35;
  font-weight: 600;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
  letter-spacing: 0.03em;
}
.wheel-seg span {
  transform: rotate(36deg);
  display: block;
  max-width: 70px;
}

.wheel-pointer {
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  width: 0;
  height: 0;
  border-left: 16px solid transparent;
  border-right: 16px solid transparent;
  border-top: 28px solid var(--gold);
  filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
  transition: transform 0.1s;
}
.wheel-pointer::after {
  content: '';
  position: absolute;
  top: -28px;
  left: -16px;
  width: 0;
  height: 0;
  border-left: 16px solid transparent;
  border-right: 16px solid transparent;
  border-top: 28px solid rgba(232, 201, 106, 0.4);
  transform: translateY(6px);
}

.wheel-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, var(--gold-pale), var(--gold), var(--gold2));
  border-radius: 50%;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  cursor: pointer;
  box-shadow:
    0 0 0 4px rgba(232, 201, 106, 0.2),
    0 0 30px rgba(232, 201, 106, 0.5),
    0 4px 15px rgba(0, 0, 0, 0.4);
  transition: all 0.2s;
  user-select: none;
}
.wheel-center:hover {
  transform: translate(-50%, -50%) scale(1.08);
  box-shadow:
    0 0 0 6px rgba(232, 201, 106, 0.3),
    0 0 40px rgba(232, 201, 106, 0.6),
    0 6px 20px rgba(0, 0, 0, 0.4);
}
.wheel-center:active { transform: translate(-50%, -50%) scale(0.95); }

/* 旋转时的动态光圈 */
.wheel.spinning {
  box-shadow:
    0 0 0 6px rgba(232, 201, 106, 0.4),
    0 0 0 10px rgba(232, 201, 106, 0.1),
    0 0 80px rgba(232, 201, 106, 0.25),
    inset 0 0 40px rgba(0, 0, 0, 0.3);
}

.btn-lucky {
  background: linear-gradient(135deg, var(--gold-pale), var(--gold), var(--gold2));
  color: #0c0c18;
  border: none;
  padding: 16px 48px;
  border-radius: 50px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  letter-spacing: 0.1em;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(232, 201, 106, 0.3);
}
.btn-lucky:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(232, 201, 106, 0.45);
}
.btn-lucky:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* 结果展示 */
.result-box {
  display: none;
  margin-top: 24px;
  padding: 28px 24px;
  background: linear-gradient(135deg, rgba(232, 201, 106, 0.06), rgba(232, 168, 76, 0.04));
  border: 1px solid rgba(232, 201, 106, 0.2);
  border-radius: 20px;
  text-align: center;
  width: 100%;
  max-width: 400px;
}
.result-box.show {
  display: block;
  animation: resultShow 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
@keyframes resultShow {
  from { opacity: 0; transform: scale(0.9) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.result-rank {
  font-size: 2rem;
  margin-bottom: 12px;
  letter-spacing: 0.1em;
}
.result-desc {
  font-size: 0.88rem;
  color: var(--text2);
  line-height: 1.9;
}

/* ── 2. 成语接龙 ── */
.idiom-game { max-width: 500px; margin: 0 auto; text-align: center; }
.idiom-score {
  display: flex;
  gap: 24px;
  justify-content: center;
  margin-bottom: 24px;
  padding: 14px 24px;
  background: rgba(232, 201, 106, 0.05);
  border: 1px solid rgba(232, 201, 106, 0.1);
  border-radius: 14px;
  font-size: 0.9rem;
}
.idiom-score strong { color: var(--gold); font-size: 1.2rem; }
.idiom-display {
  font-size: 3rem;
  font-weight: 700;
  color: var(--gold);
  margin: 20px 0;
  letter-spacing: 0.3em;
  text-shadow: 0 0 30px rgba(232, 201, 106, 0.3);
  animation: charPulse 2s ease-in-out infinite;
}
@keyframes charPulse {
  0%, 100% { text-shadow: 0 0 20px rgba(232, 201, 106, 0.2); }
  50% { text-shadow: 0 0 40px rgba(232, 201, 106, 0.5); }
}
.idiom-hint {
  font-size: 0.82rem;
  color: var(--text2);
  margin-bottom: 20px;
}
.idiom-input {
  width: 100%;
  padding: 14px 18px;
  background: rgba(8, 8, 15, 0.8);
  border: 1px solid rgba(232, 201, 106, 0.15);
  border-radius: 14px;
  color: var(--text);
  font-size: 1.05rem;
  text-align: center;
  outline: none;
  transition: all 0.3s;
  letter-spacing: 0.1em;
}
.idiom-input:focus {
  border-color: rgba(232, 201, 106, 0.5);
  box-shadow: 0 0 20px rgba(232, 201, 106, 0.1);
}
.idiom-input::placeholder { color: var(--text3); letter-spacing: 0.05em; }
.idiom-btn {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #0c0c18;
  border: none;
  padding: 13px 36px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  margin-top: 16px;
  transition: all 0.3s;
  letter-spacing: 0.05em;
}

}
@keyframes stepIn {

}
.idiom-step strong { color: var(--gold); font-family: monospace; min-width: 50px; }

  margin-bottom: 14px;
}
.calc-group { margin-bottom: 14px; }
.calc-label {

}
.calc-input {

  border: 1px solid rgba(232, 201, 106, 0.12);
  border-radius: 12px;

}

}

.calc-btn {

/* ── 4. BMI ── */

.bmi-bar { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.08); margin: 16px 0; overflow: hidden; }

function openApp(id) {
  const app = APPS.find(a => a.id === id);

  const title = app.icon + ' ' + app.title;

const FORTUNES = [
  { rank:'🌟 大吉', color:'#e8c96a', desc:'今日诸事顺遂，宜大胆行动。机遇降临，把握时机将收获满满。保持开放心态，贵人相助，工作上突破有望。' },

function fortuneHTML() {
  return `<div class="wheel-section">
  <div class="body-note">点击中间金色按钮转动命运之轮</div>
  <div class="wheel-wrap">
    <div class="wheel-pointer"></div>
    <div class="wheel" id="wheel"></div>
    <div class="wheel-center" id="wheelCenter" onclick="spinWheel()" title="点击转动">▶</div>
  </div>
  <button class="btn-lucky" id="btnLucky" onclick="spinWheel()">开始抽签</button>
  <div class="result-box" id="resultBox">
    <div class="result-rank" id="resultRank"></div>
    <div class="result-desc" id="resultDesc"></div>
  </div>
</div>`;
}

function initWheel() {
  const wheel = document.getElementById('wheel');
  if (!wheel) return;
  wheel.innerHTML = '';
  const segs = FORTUNES.length;
  const angle = 360 / segs;
  FORTUNES.forEach((f, i) => {
    const el = document.createElement('div');
    el.className = 'wheel-seg';
    // 用渐变色区分各扇区
    const colors = ['#e8c96a','#4a9eff','#6bcb77','#a66cff','#e74c3c'];
    el.style.cssText = `
      transform: rotate(${i * angle}deg);
      background: conic-gradient(from ${i*angle}deg, ${colors[i]} 0%, ${colors[i]}88 100%);
    `;
    el.innerHTML = `<span>${f.rank}</span>`;
    wheel.appendChild(el);
  });
}

let spinning = false;
function spinWheel() {
  if (spinning) return;
  const wheel = document.getElementById('wheel');
  const btn = document.getElementById('btnLucky');
  if (!wheel) return;
  spinning = true;
  if (btn) { btn.disabled = true; btn.textContent = '命运转盘中...'; }
  const deg = 1800 + Math.floor(Math.random() * 1800);
  wheel.style.transition = 'transform 4.5s cubic-bezier(.2,.8,.3,1)';
  wheel.style.transform = `rotate(${deg}deg)`;
  wheel.classList.add('spinning');
  const segs = FORTUNES.length;
  const segAngle = 360 / segs;
  const normalized = ((deg % 360) + segAngle / 2) % 360;
  const idx = Math.floor(normalized / segAngle);
  const resultIdx = (segs - idx) % segs;
  setTimeout(() => {
    const f = FORTUNES[resultIdx];
    const rankEl = document.getElementById('resultRank');
    const descEl = document.getElementById('resultDesc');
    if (rankEl) {
      rankEl.textContent = f.rank;
      rankEl.style.color = f.color;
      rankEl.style.textShadow = `0 0 30px ${f.color}66`;
    }
    if (descEl) descEl.textContent = f.desc;
    const box = document.getElementById('resultBox');
    if (box) box.classList.add('show');
    if (btn) { btn.disabled = false; btn.textContent = '再次抽签'; }
    wheel.classList.remove('spinning');
    spinning = false;
  }, 4600);
}
window.initWheel = initWheel;

let idiomScore = 0, idiomBest = 0, currentChar = '成';

function idiomHTML() {
  return `<div class="idiom-game">
  <div class="idiom-score">
    <span>本局 <strong id="idiomScoreNum">0</strong> 分</span>
    <span>最高 <strong id="idiomBestNum">0</strong> 分</span>
  </div>
  <div class="idiom-display" id="idiomDisplay">成</div>
  <div class="idiom-hint" id="idiomHint">请输入以「成」开头的成语</div>
  <input class="idiom-input" id="idiomInput" placeholder="输入成语后按回车" autocomplete="off">
  <button class="idiom-btn" onclick="checkIdiom({key:'Enter'})">确认接龙</button>
  <div class="idiom-history" id="idiomHistory"></div>
</div>`;
}

function checkIdiom(e) {
  if (e.key !== 'Enter') return;
  const input = document.getElementById('idiomInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  if (val.length < 4) { shakeInput(); return; }
  if (!val.startsWith(currentChar)) {
    shakeInput();
    return;
  }
  const nextChar = val[val.length - 1];
  const hasNext = IDIOMS[nextChar];
  const history = document.getElementById('idiomHistory');
  if (hasNext) {
    idiomScore++;
    if (idiomScore > idiomBest) idiomBest = idiomScore;
    currentChar = nextChar;
    const scoreNum = document.getElementById('idiomScoreNum');
    const bestNum = document.getElementById('idiomBestNum');
    const display = document.getElementById('idiomDisplay');
    const hint = document.getElementById('idiomHint');
    if (scoreNum) scoreNum.textContent = idiomScore;
    if (bestNum) bestNum.textContent = idiomBest;
    if (display) display.textContent = nextChar;
    if (hint) hint.textContent = '请输入以「' + nextChar + '」开头的成语';
    history.innerHTML = `<div class="idiom-step"><strong>+1</strong><span>「${val}」→ 「${nextChar}」</span></div>` + history.innerHTML;
    input.value = '';
  } else {
    idiomScore = 0;
    history.innerHTML = `<div class="idiom-step" style="color:#e74c3c"><strong style="color:#e74c3c">×</strong><span>「${val}」无法继续接龙，当前字：「${currentChar}」</span></div>` + history.innerHTML;
    const scoreNum = document.getElementById('idiomScoreNum');
    if (scoreNum) scoreNum.textContent = '0';
    input.value = '';
  }
}

function shakeInput() {
  const input = document.getElementById('idiomInput');
  if (!input) return;
  input.style.animation = 'none';
  input.offsetHeight;
  input.style.animation = 'shake 0.4s ease';
  setTimeout(() => input.style.animation = '', 400);
}

function calcHTML() {
  return `<div class="calc-wrap">
  <div class="calc-row-grid">

      <div class="calc-label">贷款年限</div>
      <select class="calc-input" id="calcYears">
        <option value="5">5年（60期）</option>
        <option value="10">10年（120期）</option>
        <option value="15">15年（180期）</option>
        <option value="20" selected>20年（240期）</option>
        <option value="25">25年（300期）</option>
        <option value="30">30年（360期）</option>
      </select>
    </div>
  </div>
  <div class="calc-group">
    <div class="calc-label">贷款类型</div>
    <select class="calc-input" id="calcType">
      <option value="gjj">公积金贷款（3.1%）</option>
      <option value="sd" selected>商业贷款（4.3%）</option>
      <option value="mix">组合贷（各50%）</option>
    </select>
  </div>
  <div class="calc-row-grid">
    <div class="calc-group">
      <div class="calc-label">商贷利率（%）</div>
      <input class="calc-input" id="calcRate" type="number" value="4.3" step="0.01">
    </div>
    <div class="calc-group">
      <div class="calc-label">公积金利率（%）</div>
      <input class="calc-input" id="calcRate2" type="number" value="3.1" step="0.01">
    </div>
  </div>
  <button class="calc-btn" onclick="calcCalc()">计算月供</button>
  <div class="calc-result" id="calcResult">点击上方按钮计算月供详情</div>
</div>`;
}

function calcCalc() {
  const amount = parseFloat(document.getElementById('calcAmount').value) * 10000;
  const years = parseInt(document.getElementById('calcYears').value);
  const type = document.getElementById('calcType').value;
  const rate = parseFloat(document.getElementById('calcRate').value) / 100;
  const rate2 = parseFloat(document.getElementById('calcRate2').value) / 100;
  const months = years * 12;
  let monthly, total, interest;
  const fmt = n => '¥' + Math.round(n).toLocaleString();

  if (type === 'gjj') {
    monthly = amount * (rate2/12 * Math.pow(1+rate2/12, months)) / (Math.pow(1+rate2/12, months)-1);
    total = monthly * months; interest = total - amount;
    document.getElementById('calcResult').innerHTML =
      `<strong>公积金贷款</strong><br>` +
      `贷款本金：${fmt(amount)}<br>` +
      `年利率：${(rate2*100).toFixed(2)}%<br>` +
      `还款期数：${months}期<br><br>` +
      `<span class="highlight">月供 ${fmt(monthly)}</span><br>` +
      `累计利息：${fmt(interest)}<br>` +
      `累计还款：<strong>${fmt(total)}</strong>`;
  } else if (type === 'sd') {
    monthly = amount * (rate/12 * Math.pow(1+rate/12, months)) / (Math.pow(1+rate/12, months)-1);
    total = monthly * months; interest = total - amount;
    document.getElementById('calcResult').innerHTML =
      `<strong>商业贷款</strong><br>` +
      `贷款本金：${fmt(amount)}<br>` +
      `年利率：${(rate*100).toFixed(2)}%<br>` +
      `还款期数：${months}期<br><br>` +
      `<span class="highlight">月供 ${fmt(monthly)}</span><br>` +
      `累计利息：${fmt(interest)}<br>` +
      `累计还款：<strong>${fmt(total)}</strong>`;
  } else {
    const half = amount / 2;
    const m1 = half * (rate2/12*Math.pow(1+rate2/12,months)) / (Math.pow(1+rate2/12,months)-1);
    const m2 = half * (rate/12*Math.pow(1+rate/12,months)) / (Math.pow(1+rate/12,months)-1);
    monthly = m1 + m2; total = monthly * months; interest = total - amount;
    document.getElementById('calcResult').innerHTML =
      `<strong>组合贷款</strong>（各50%）<br>` +
      `贷款本金：${fmt(amount)}<br><br>` +
      `公积金：${fmt(half)} × ${(rate2*100).toFixed(2)}% = ${fmt(m1)}/月<br>` +
      `商　贷：${fmt(half)} × ${(rate*100).toFixed(2)}% = ${fmt(m2)}/月<br><br>` +
      `<span class="highlight">合计月供 ${fmt(monthly)}</span><br>` +
      `累计利息：${fmt(interest)}`;
  }
}

function bmiHTML() {
  return `<div class="calc-wrap">
  <div class="calc-row-grid">
    <div class="calc-group">
      <div class="calc-label">身高（cm）</div>
      <input class="calc-input" id="bmiH" type="number" placeholder="170">
    </div>
    <div class="calc-group">
      <div class="calc-label">体重（kg）</div>
      <input class="calc-input" id="bmiW" type="number" placeholder="65">
    </div>
  </div>
  <button class="calc-btn" onclick="calcBMI()">计算BMI</button>
  <div class="bmi-result" id="bmiResult" style="display:none"></div>
</div>`;
}

function calcBMI() {
  const h = parseFloat(document.getElementById('bmiH').value) / 100;
  const w = parseFloat(document.getElementById('bmiW').value);
  if (!h || !w || h <= 0 || w <= 0) {
    alert('请输入有效的身高和体重');
    return;
  }
  const bmi = w / (h * h);
  let label, color, tip;
  if (bmi < 18.5) { label='偏瘦'; color='#3498db'; tip='适当增重，保持营养均衡，规律作息'; }
  else if (bmi < 24) { label='正常'; color='#27ae60'; tip='继续保持！体型保持得很好，作息规律是秘诀'; }
  else if (bmi < 28) { label='偏胖'; color='#f39c12'; tip='注意饮食结构，减少高热量食物，增加有氧运动'; }
  else { label='肥胖'; color='#e74c3c'; tip='建议咨询专业医生，制定科学减重计划'; }
  const pct = Math.min(Math.max((bmi - 15) / (30 - 15) * 100, 2), 98);
  const box = document.getElementById('bmiResult');
  box.style.display = 'block';
  box.innerHTML = `
    <div class="bmi-number" style="color:${color}">${bmi.toFixed(1)}</div>
    <div class="bmi-label" style="color:${color}">${label}</div>
    <div class="bmi-tip">${tip}</div>
    <div class="bmi-bar"><div class="bmi-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="bmi-scale"><span>偏瘦&lt;18.5</span><span>正常 18.5-24</span><span>偏胖 24-28</span><span>肥胖&gt;28</span></div>`;
}

function loadHistory() {
  const today = new Date();
  const m = String(today.getMonth() + 1).padStart(2, '0');
  const d = String(today.getDate()).padStart(2, '0');
  fetch(`https://api.yiyouyun.com/api/history?month=${m}&day=${d}`)
    .then(r => r.json())
    .then(data => {
      const list = document.getElementById('historyList');
      if (!data || !data.length) {
        list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2)">今日暂无数据，明天再来看看~</div>';
        return;
      }
      list.innerHTML = data.slice(0, 15).map((item, i) => `
        <div class="history-item" style="animation-delay:${i * 0.05}s">
          <div class="history-year">${item.year || ''}年</div>
          <div class="history-title">${item.title || item.event || ''}</div>
        </div>`).join('');
    })
    .catch(() => {
      const list = document.getElementById('historyList');
      list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2)">数据加载失败，请检查网络后重试</div>';
    });
}
