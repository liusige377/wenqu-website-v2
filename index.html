<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问渠 - 生活中的智慧锦囊</title>
<meta name="description" content="问渠——生活中的智慧锦囊，永久免费。运势抽签、成语接龙、房贷计算、诗词壁纸，一个页面全搞定。">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0c18">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%231a1a2e'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%23e8c96a'>渠</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');

:root {
  --bg: #08080f;
  --bg2: #0d0d1a;
  --gold: #e8c96a;
  --gold2: #c9a84c;
  --gold-pale: #f5e6b0;
  --gold-dim: rgba(232,201,106,0.4);
  --text: #ede8df;
  --text2: #9a9080;
  --text3: #5a5448;
  --blue: #6ab0ff;
  --border: rgba(232,201,106,0.1);
  --border-hover: rgba(232,201,106,0.35);
  --card-bg: rgba(14,14,28,0.75);
  --card-hover: rgba(20,20,40,0.92);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Serif SC','PingFang SC','Microsoft YaHei',serif;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ═══ 动态背景 ═══ */
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-grad{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 100% 60% at 50% -10%, rgba(232,201,106,0.09) 0%, transparent 60%),
    radial-gradient(ellipse 70% 50% at 90% 90%, rgba(74,130,255,0.04) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 5% 70%, rgba(200,150,60,0.05) 0%, transparent 50%),
    linear-gradient(175deg, #07070e 0%, #0b0b1a 40%, #080810 100%);
}
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(232,201,106,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,201,106,0.018) 1px, transparent 1px);
  background-size:72px 72px;
  mask-image:radial-gradient(ellipse 95% 80% at 50% 0%, black 0%, transparent 65%);
}
.bg-orb{
  position:absolute;border-radius:50%;
  filter:blur(80px);opacity:0.5;
  animation:orbFloat 25s ease-in-out infinite;
}
.bg-orb:nth-child(1){width:500px;height:500px;background:radial-gradient(circle,rgba(232,201,106,0.12),transparent 70%);top:-10%;left:-10%;animation-duration:32s}
.bg-orb:nth-child(2){width:380px;height:380px;background:radial-gradient(circle,rgba(74,130,255,0.07),transparent 70%);top:40%;right:-8%;animation-duration:24s;animation-delay:-9s}
.bg-orb:nth-child(3){width:250px;height:250px;background:radial-gradient(circle,rgba(220,170,80,0.09),transparent 70%);bottom:10%;left:25%;animation-duration:28s;animation-delay:-15s}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-35px) scale(1.07)}}
.bg-drops{position:absolute;inset:0}
.drop{position:absolute;width:2px;height:2px;background:rgba(232,201,106,0.3);border-radius:50%;animation:dropFall linear infinite}
@keyframes dropFall{0%{transform:translateY(-10px);opacity:0}20%{opacity:1}90%{opacity:0.2}100%{transform:translateY(100vh);opacity:0}}

/* ═══ 页面布局 ═══ */
.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px 60px}

/* ── Header ── */
.site-header{
  padding:56px 0 40px;text-align:center;position:relative;
}
.site-header::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:320px;height:320px;
  background:radial-gradient(circle,rgba(232,201,106,0.12) 0%, transparent 65%);
  pointer-events:none;
  animation:pulseGlow 5s ease-in-out infinite;
}
@keyframes pulseGlow{0%,100%{opacity:0.7;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.15)}}

/* Logo */
.logo{display:inline-block;position:relative}
.logo-hanzi{
  font-family:'Cormorant Garamond','Noto Serif SC',serif;
  font-size:clamp(4rem,9vw,7rem);
  font-weight:700;letter-spacing:0.08em;
  background:linear-gradient(160deg,#f5e6b0 0%,#e8c96a 30%,#c9a84c 60%,#e8c96a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logoFloat 7s ease-in-out infinite;
  filter:drop-shadow(0 0 40px rgba(232,201,106,0.35));
  line-height:1;
}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.logo-en{
  font-family:'Cormorant Garamond',serif;
  font-size:0.72rem;letter-spacing:0.6em;color:var(--text3);text-transform:uppercase;
  margin-top:6px;
}
.logo-subtitle{
  font-size:0.9rem;color:var(--text2);margin-top:16px;
  font-style:italic;max-width:420px;margin-left:auto;margin-right:auto;
  line-height:1.9;letter-spacing:0.04em;
}
.logo-source{
  font-size:0.7rem;color:var(--text3);margin-top:8px;letter-spacing:0.08em;
}
.logo-badge{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:18px;padding:6px 16px;
  background:rgba(232,201,106,0.08);
  border:1px solid rgba(232,201,106,0.2);
  border-radius:20px;font-size:0.68rem;color:var(--gold);
  letter-spacing:0.08em;
}
.logo-badge span{color:var(--text2)}

/* ── 今日日期条 ── */
.date-strip{
  display:flex;align-items:center;justify-content:center;gap:20px;
  padding:14px 24px;
  background:var(--card-bg);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:16px;
  margin-bottom:36px;
  position:relative;overflow:hidden;
}
.date-strip::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
}
.date-big{
  font-family:'Cormorant Garamond',serif;
  font-size:1.8rem;font-weight:700;color:var(--gold);
  text-shadow:0 0 20px rgba(232,201,106,0.5);line-height:1;
}
.date-meta{font-size:0.75rem;color:var(--text2);line-height:1.5}
.date-lunar{color:var(--text3);font-size:0.68rem}
.date-sep{width:1px;height:32px;background:rgba(232,201,106,0.12)}

/* ── 分区标题 ── */
.section-head{
  display:flex;align-items:center;gap:16px;margin-bottom:20px;
}
.section-head::before,.section-head::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
}
.section-label{
  font-size:0.65rem;letter-spacing:0.28em;text-transform:uppercase;
  color:var(--text3);white-space:nowrap;
}

/* ═══ ═══ 自动展示区（五宫格） ═══ ═══ */
.daily-section{margin-bottom:44px}

/* 今日运势大卡（占2格） */
.fortune-featured{
  background:var(--card-bg);backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--border);border-radius:24px;
  padding:28px 30px;position:relative;overflow:hidden;
  cursor:default;
  transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}
.fortune-featured:hover{
  border-color:var(--border-hover);
  box-shadow:0 20px 60px rgba(232,201,106,0.1),0 8px 24px rgba(0,0,0,0.4);
  transform:translateY(-4px);
}
.fortune-featured::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#e8c96a,transparent);
  opacity:0.6;
}
.fortune-bg-art{
  position:absolute;right:-20px;top:-20px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(232,201,106,0.06) 0%,transparent 70%);
  pointer-events:none;
}
.fortune-title{font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.fortune-title span{color:var(--text3);font-weight:400;font-size:0.72rem}
.fortune-wheel-wrap{
  display:flex;align-items:center;gap:28px;
}
.fortune-wheel{
  width:130px;height:130px;border-radius:50%;
  background:conic-gradient(
    #e8c96a 0deg 72deg,
    #6ab0ff 72deg 144deg,
    #6bcb77 144deg 216deg,
    #b06aff 216deg 288deg,
    #ff6b6b 288deg 360deg
  );
  position:relative;cursor:pointer;flex-shrink:0;
  box-shadow:
    0 0 0 5px rgba(232,201,106,0.15),
    0 0 0 9px rgba(232,201,106,0.04),
    0 0 40px rgba(232,201,106,0.12),
    inset 0 0 30px rgba(0,0,0,0.3);
  transition:transform 0.3s, box-shadow 0.3s;
}
.fortune-wheel:hover{
  transform:scale(1.04);
  box-shadow:
    0 0 0 6px rgba(232,201,106,0.25),
    0 0 0 10px rgba(232,201,106,0.06),
    0 0 60px rgba(232,201,106,0.2),
    inset 0 0 30px rgba(0,0,0,0.3);
}
.fortune-wheel.spinning{animation:spinBig 4.5s cubic-bezier(.2,.8,.3,1)}
@keyframes spinBig{to{transform:rotate(1980deg)}}
.fortune-ct{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:44px;height:44px;
  background:linear-gradient(135deg,#f5e6b0,#e8c96a,#c9a84c);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1rem;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,0.4),0 0 24px rgba(232,201,106,0.4);
  transition:all 0.2s;
  z-index:2;
}
.fortune-ct:hover{transform:translate(-50%,-50%) scale(1.1);box-shadow:0 6px 20px rgba(0,0,0,0.4),0 0 36px rgba(232,201,106,0.5)}
.fortune-info{flex:1}
.fortune-result{
  font-size:1.5rem;font-weight:700;margin-bottom:8px;
  min-height:2rem;letter-spacing:0.04em;
}
.fortune-desc{font-size:0.8rem;color:var(--text2);line-height:1.8;margin-bottom:14px;min-height:3em}
.fortune-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#e8c96a,#c9a84c);
  color:#0c0c18;border:none;padding:10px 22px;
  border-radius:50px;font-size:0.82rem;font-weight:700;
  cursor:pointer;letter-spacing:0.06em;
  transition:all 0.3s;box-shadow:0 4px 16px rgba(232,201,106,0.25);
}
.fortune-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,201,106,0.4)}
.fortune-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none}
.fortune-tips{font-size:0.68rem;color:var(--text3);margin-top:10px}

/* 五宫格布局 */
.five-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:auto auto;
  gap:16px;
  margin-top:16px;
}
.cell-a{grid-column:1/2}
.cell-b{grid-column:2/4}

/* 诗词大卡 */
.poem-card{
  background:var(--card-bg);backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--border);border-radius:24px;
  padding:26px;height:100%;
  cursor:pointer;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
  position:relative;overflow:hidden;
}
.poem-card:hover{
  border-color:var(--border-hover);
  transform:translateY(-4px);
  box-shadow:0 16px 50px rgba(232,201,106,0.08),0 6px 20px rgba(0,0,0,0.4);
}
.poem-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#e8c96a80,transparent);
}
.poem-card::after{
  content:'';position:absolute;right:-20px;bottom:-20px;
  width:160px;height:160px;
  background:radial-gradient(circle,rgba(232,201,106,0.04) 0%,transparent 70%);
  pointer-events:none;
}
.poem-eyebrow{font-size:0.7rem;color:var(--text3);letter-spacing:0.15em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.poem-title{font-size:1.3rem;color:var(--gold-pale);font-weight:600;margin-bottom:6px;letter-spacing:0.06em}
.poem-author{font-size:0.72rem;color:var(--text3);margin-bottom:20px;letter-spacing:0.06em}
.poem-content{font-size:0.95rem;line-height:2.3;letter-spacing:0.12em;color:var(--text);white-space:pre-line}
.poem-refresh{font-size:0.68rem;color:var(--text3);margin-top:16px;display:inline-flex;align-items:center;gap:4px;transition:color 0.2s}
.poem-card:hover .poem-refresh{color:var(--gold)}

/* 历史今天大卡 */
.history-card{
  background:var(--card-bg);backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--border);border-radius:24px;
  padding:26px;height:100%;
  cursor:pointer;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
  position:relative;overflow:hidden;
}
.history-card:hover{
  border-color:var(--border-hover);
  transform:translateY(-4px);
  box-shadow:0 16px 50px rgba(232,201,106,0.08),0 6px 20px rgba(0,0,0,0.4);
}
.history-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#6ab0ff80,transparent);
}
.history-card-title{font-size:0.7rem;color:var(--text3);letter-spacing:0.15em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.history-badge{font-size:0.62rem;padding:3px 9px;background:rgba(106,176,255,0.1);color:var(--blue);border:1px solid rgba(106,176,255,0.2);border-radius:20px;margin-left:auto}
.history-items{padding:0}
.history-item{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.history-item:last-child{border-bottom:none}
.history-year{font-size:0.65rem;font-weight:700;color:var(--blue);min-width:40px;padding-top:2px;opacity:0.8}
.history-text{font-size:0.83rem;line-height:1.6;color:var(--text2)}
.history-sep{height:1px;background:rgba(255,255,255,0.04);margin:4px 0}
.history-more{font-size:0.7rem;color:var(--text3);margin-top:12px;display:inline-flex;align-items:center;gap:4px;transition:color 0.2s}
.history-card:hover .history-more{color:var(--blue)}

/* 壁纸预览卡 */
.wallpaper-card{
  background:var(--card-bg);backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--border);border-radius:24px;
  padding:22px;cursor:pointer;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
  position:relative;overflow:hidden;
}
.wallpaper-card:hover{border-color:var(--border-hover);transform:translateY(-4px);box-shadow:0 16px 50px rgba(232,201,106,0.08)}
.wallpaper-img{width:100%;height:100px;object-fit:cover;border-radius:14px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,0.4);transition:transform 0.3s}
.wallpaper-card:hover .wallpaper-img{transform:scale(1.02)}
.wallpaper-label{font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:4px}
.wallpaper-desc{font-size:0.72rem;color:var(--text2)}

/* 油价节气卡 */
.mini-card{
  background:var(--card-bg);backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--border);border-radius:24px;
  padding:20px 22px;cursor:pointer;transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
}
.mini-card:hover{border-color:var(--border-hover);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,0.35)}
.mini-card-title{font-size:0.68rem;color:var(--text3);letter-spacing:0.12em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.oil-prices{display:flex;flex-direction:column;gap:8px}
.oil-row{display:flex;justify-content:space-between;align-items:center;font-size:0.8rem}
.oil-city{color:var(--text2)}
.oil-p{color:var(--gold);font-weight:600}
.oil-foot{font-size:0.62rem;color:var(--text3);margin-top:10px}
.solar-cur{text-align:center;padding:14px;background:rgba(232,201,106,0.07);border-radius:14px;border:1px solid rgba(232,201,106,0.12);margin-bottom:10px}
.solar-cur-name{font-size:1.6rem;color:var(--gold);font-weight:700;margin-bottom:4px}
.solar-cur-day{font-size:0.65rem;color:var(--text2)}
.solar-pills{display:flex;flex-wrap:wrap;gap:5px}
.solar-p{font-size:0.62rem;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,0.04);color:var(--text3);border:1px solid rgba(255,255,255,0.06)}
.solar-p.on{background:rgba(232,201,106,0.12);color:var(--gold);border-color:rgba(232,201,106,0.25)}

/* ═══ ═══ 工具区 ═══ ═══ */
.tools-section{margin-top:10px}
.tools-label{display:none}
.tools-main{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}
.tool-card{
  background:var(--card-bg);backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--border);border-radius:22px;
  padding:24px 20px;cursor:pointer;
  transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
  text-decoration:none;color:inherit;
  position:relative;overflow:hidden;
  animation:cardIn 0.5s ease-out both;
}
.tool-card:nth-child(1){animation-delay:0.06s}
.tool-card:nth-child(2){animation-delay:0.12s}
.tool-card:nth-child(3){animation-delay:0.18s}
.tool-card:nth-child(4){animation-delay:0.24s}
.tool-card:nth-child(5){animation-delay:0.30s}
.tool-card:nth-child(6){animation-delay:0.36s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.tool-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--tool-color,#e8c96a),transparent);
  opacity:0;transition:opacity 0.35s;
}
.tool-card:hover{border-color:var(--border-hover);transform:translateY(-6px);box-shadow:0 20px 60px rgba(232,201,106,0.12),0 8px 28px rgba(0,0,0,0.45);background:var(--card-hover)}
.tool-card:hover::before{opacity:0.8}
.tool-icon{
  font-size:2rem;margin-bottom:14px;
  width:52px;height:52px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(232,201,106,0.06);
  border:1px solid rgba(232,201,106,0.1);
  transition:all 0.3s;
}
.tool-card:hover .tool-icon{transform:scale(1.1);background:rgba(232,201,106,0.12)}
.tool-name{font-size:0.95rem;font-weight:600;margin-bottom:6px;letter-spacing:0.02em}
.tool-desc{font-size:0.75rem;color:var(--text2);line-height:1.6}
.tool-arrow{position:absolute;bottom:18px;right:18px;font-size:0.78rem;color:var(--text3);opacity:0;transform:translateX(-4px);transition:all 0.3s}
.tool-card:hover .tool-arrow{opacity:1;transform:translateX(0);color:var(--gold)}

/* ── Footer ── */
.site-footer{text-align:center;padding:48px 0 24px;position:relative}
.site-footer::before{content:'';display:block;width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0 auto 20px}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;background:linear-gradient(135deg,var(--gold-pale),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.footer-text{font-size:0.68rem;color:var(--text3);letter-spacing:0.12em}

/* ═══ 模态框 ═══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(4,4,10,0.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:1000;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease}
.modal-overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:rgba(11,11,22,0.98);backdrop-filter:blur(32px) saturate(180%);
  border:1px solid rgba(232,201,106,0.1);border-radius:28px;
  width:100%;max-width:680px;max-height:88vh;overflow-y:auto;
  box-shadow:0 40px 120px rgba(0,0,0,0.7),0 0 0 1px rgba(232,201,106,0.04);
  animation:slideUp 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
}

  document.getElementById('homeDesc').textContent='转动金色轮盘，看看今日命运如何安排';

function spinFortune(){
  if(spinning)return;
  const today=new Date().toDateString();
  const s=localStorage.getItem(FK);
  if(s&&JSON.parse(s).date===today)return;
  const wheel=document.getElementById('homeWheel');
  const btn=document.getElementById('homeBtn');
  const result=document.getElementById('homeResult');
  const desc=document.getElementById('homeDesc');
  if(!wheel||!btn)return;
  spinning=true;
  btn.disabled=true;btn.textContent='命运转盘中...';
  const deg=1800+Math.floor(Math.random()*1800);
  wheel.style.transition='transform 4.5s cubic-bezier(.2,.8,.3,1)';
  wheel.style.transform=`rotate(${deg}deg)`;
  wheel.classList.add('spinning');
  const segs=FORTUNES.length;
  const sa=360/segs;
  setTimeout(()=>{
    const norm=((deg%360)+sa/2)%360;
    const idx=Math.floor(norm/sa);
    const fi=(segs-idx)%segs;
    const f=FORTUNES[fi];
    result.textContent=f.r;result.style.color=f.c;
    desc.textContent=f.d;
    btn.textContent='今日已抽签 ✓';
    document.getElementById('homeTips').textContent='明天再来吧';
    localStorage.setItem(FK,JSON.stringify({date:today,r:f.r,c:f.c,d:f.d}));
    spinning=false;
    wheel.classList.remove('spinning');
  },4600);
}

// ═══ 房贷 ═══
function calcH(){return`<div class="calc-wrap">
  <div class="calc-row"><div class="calc-grp"><div class="calc-lbl">贷款金额（万元）</div><input class="calc-input" id="ca" type="number" value="100" min="1"></div>
  <div class="calc-grp"><div class="calc-lbl">贷款年限</div><select class="calc-input" id="cy"><option value="5">5年</option><option value="10">10年</option><option value="15">15年</option><option value="20" selected>20年</option><option value="25">25年</option><option value="30">30年</option></select></div></div>
  <div class="calc-grp"><div class="calc-lbl">贷款类型</div><select class="calc-input" id="ct"><option value="gjj">公积金贷款（3.1%）</option><option value="sd" selected>商业贷款（4.3%）</option><option value="mix">组合贷（各50%）</option></select></div>
  <div class="calc-row"><div class="calc-grp"><div class="calc-lbl">商贷利率（%）</div><input class="calc-input" id="cr" type="number" value="4.3" step="0.01"></div>
  <div class="calc-grp"><div class="calc-lbl">公积金利率（%）</div><input class="calc-input" id="cr2" type="number" value="3.1" step="0.01"></div></div>
  <button class="calc-btn" onclick="runCalc()">计算月供</button>
  <div class="calc-res" id="calcR">点击按钮计算月供详情</div>
</div>`;}
function runCalc(){
  const amt=parseFloat(document.getElementById('ca').value)*10000;
  const yrs=parseInt(document.getElementById('cy').value);
  const type=document.getElementById('ct').value;
  const r=parseFloat(document.getElementById('cr').value)/100;
  const r2=parseFloat(document.getElementById('cr2').value)/100;
  const mo=yrs*12;const fmt=n=>'¥'+Math.round(n).toLocaleString();
  let s='';
  if(type==='gjj'){
    const m=amt*(r2/12*Math.pow(1+r2/12,mo))/(Math.pow(1+r2/12,mo)-1);
    const t=m*mo,i=t-amt;
    s=`<strong>公积金贷款</strong><br>本金：${fmt(amt)} · ${yrs}年 · ${(r2*100).toFixed(2)}%<br><br><span class="hl">月供 ${fmt(m)}</span><br>总利息：${fmt(i)} · 共还：<strong>${fmt(t)}</strong>`;
  }else if(type==='sd'){
    const m=amt*(r/12*Math.pow(1+r/12,mo))/(Math.pow(1+r/12,mo)-1);
    const t=m*mo;
    s=`<strong>商业贷款</strong><br>本金：${fmt(amt)} · ${yrs}年 · ${(r*100).toFixed(2)}%<br><br><span class="hl">月供 ${fmt(m)}</span><br>总利息：${fmt(t-amt)} · 共还：<strong>${fmt(t)}</strong>`;
  }else{
    const h=amt/2;
    const m1=h*(r2/12*Math.pow(1+r2/12,mo))/(Math.pow(1+r2/12,mo)-1);
    const m2=h*(r/12*Math.pow(1+r/12,mo))/(Math.pow(1+r/12,mo)-1);
    const t=(m1+m2)*mo;
    s=`<strong>组合贷款</strong>（各50%）<br>本金：${fmt(amt)} · ${yrs}年<br><br>公积金：${fmt(h)} → ${fmt(m1)}/月<br>商　贷：${fmt(h)} → ${fmt(m2)}/月<br><br><span class="hl">合计月供 ${fmt(m1+m2)}</span><br>总利息：${fmt(t-amt)}`;
  }
  document.getElementById('calcR').innerHTML=s;
}

// ═══ 车贷 ═══
function carH(){return`<div class="calc-wrap">
  <div class="calc-row"><div class="calc-grp"><div class="calc-lbl">车价（万元）</div><input class="calc-input" id="cp" type="number" value="15" min="1"></div>
  <div class="calc-grp"><div class="calc-lbl">贷款年限</div><select class="calc-input" id="cny"><option value="1">1年</option><option value="2" selected>2年</option><option value="3">3年</option><option value="4">4年</option><option value="5">5年</option></select></div></div>
  <div class="calc-row"><div class="calc-grp"><div class="calc-lbl">首付比例（%）</div><input class="calc-input" id="cdn" type="number" value="30" min="10" max="80"></div>
  <div class="calc-grp"><div class="calc-lbl">贷款利率（%）</div><input class="calc-input" id="crt" type="number" value="4.75" step="0.01"></div></div>
  <div class="calc-grp"><div class="calc-lbl">还款方式</div><select class="calc-input" id="cty"><option value="bx">等额本息（月供固定）</option><option value="bj">等额本金（逐月递减）</option></select></div>
  <button class="calc-btn" onclick="runCar()">计算车贷</button>
  <div class="calc-res" id="carR">点击按钮计算</div>
</div>`;}
function runCar(){
  const p=parseFloat(document.getElementById('cp').value)*10000;
  const yrs=parseInt(document.getElementById('cny').value);
  const dn=parseFloat(document.getElementById('cdn').value)/100;
  const rate=parseFloat(document.getElementById('crt').value)/100;
  const type=document.getElementById('cty').value;
  const mo=yrs*12;
  const dp=p*dn,loan=p-dp;
  const fmt=n=>'¥'+Math.round(n).toLocaleString();
  let s='';
  if(type==='bx'){
    const m=loan*(rate/12*Math.pow(1+rate/12,mo))/(Math.pow(1+rate/12,mo)-1);
    const t=m*mo,i=t-loan;
    s=`<strong>等额本息</strong><br>车价：${fmt(p)} · 首付：${fmt(dp)}（${(dn*100).toFixed(0)}%）<br>贷款本金：<strong>${fmt(loan)}</strong> · ${yrs}年 · ${(rate*100).toFixed(2)}%<br><br><span class="hl">月供 ${fmt(m)}</span>（每月相同）<br>总利息：${fmt(i)} · 共还：<strong>${fmt(t+dp)}</strong>`;
  }else{
    const pr=loan/mo;
    const fi=loan*rate/12,li=pr*rate/12;
    const ti=loan*rate*(yrs+0.5)/2;
    s=`<strong>等额本金</strong><br>车价：${fmt(p)} · 首付：${fmt(dp)}（${(dn*100).toFixed(0)}%）<br>贷款本金：<strong>${fmt(loan)}</strong> · ${yrs}年 · ${(rate*100).toFixed(2)}%<br><br>首月：<span class="hl">${fmt(pr+fi)}</span> · 末月：约${fmt(pr+li)}<br>每月递减约 ${fmt(loan*rate/12/mo)}<br>总利息：${fmt(ti)}`;
  }
  document.getElementById('carR').innerHTML=s;
}

function bmiH(){return`<div class="calc-wrap">
  <div class="calc-row"><div class="calc-grp"><div class="calc-lbl">身高（cm）</div><input class="calc-input" id="bh" type="number" placeholder="170"></div>
  <div class="calc-grp"><div class="calc-lbl">体重（kg）</div><input class="calc-input" id="bw" type="number" placeholder="65"></div></div>

function runBMI(){
  const h=parseFloat(document.getElementById('bh').value)/100;
  const w=parseFloat(document.getElementById('bw').value);
  if(!h||!w||h<=0||w<=0){alert('请输入有效的身高和体重');return;}
  const b=w/(h*h);
  let lb,col,tip;
  if(b<18.5){lb='偏瘦';col='#3498db';tip='适当增重，保持营养均衡'}
  else if(b<24){lb='正常';col='#27ae60';tip='体型保持得很好，继续保持！'}
  else if(b<28){lb='偏胖';col='#f39c12';tip='注意饮食结构，减少高热量，增加有氧运动'}
  else{lb='肥胖';col='#e74c3c';tip='建议咨询专业医生，制定科学减重计划'}
  const pct=Math.min(Math.max((b-15)/(30-15)*100,2),98);
  const el=document.getElementById('bmiR');
  el.style.display='block';
  el.innerHTML=`<div class="bmi-n" style="color:${col}">${b.toFixed(1)}</div>
  <div class="bmi-l" style="color:${col}">${lb}</div>
  <div class="bmi-tip">${tip}</div>
  <div class="bmi-bar"><div class="bmi-fill" style="width:${pct}%;background:${col}"></div></div>
  <div class="bmi-scale"><span>偏瘦&lt;18.5</span><span>正常 18.5-24</span><span>偏胖 24-28</span><span>肥胖&gt;28</span></div>`;
}

let iS=0,iB=0,iC='成';
function idiomH(){return`<div class="idiom-game">
  <div class="idiom-score"><span>本局 <strong id="iSN">0</strong> 分</span><span>最高 <strong id="iBN">0</strong> 分</span></div>
  <div class="idiom-display" id="iDsp">成</div>
  <div class="idiom-hint" id="iHint">请输入以「成」开头的成语</div>
  <input class="idiom-input" id="iInp" placeholder="输入成语后按回车" autocomplete="off">
  <button class="idiom-btn" onclick="chkIdi({key:'Enter'})">确认接龙</button>
  <div class="idiom-hist" id="iHist"></div>
</div>`;}
function chkIdi(e){
  if(e.key!=='Enter')return;
  const inp=document.getElementById('iInp');
  if(!inp)return;
  const v=inp.value.trim();
  if(!v||v.length<4)return;
  if(!v.startsWith(iC)){
    inp.style.animation='none';inp.offsetHeight;inp.style.animation='shk 0.4s ease';setTimeout(()=>inp.style.animation='',400);return;
  }
  const nc=v[v.length-1];
  const hist=document.getElementById('iHist');
  if(IDIOMS[nc]){
    iS++;if(iS>iB)iB=iS;
    iC=nc;
    document.getElementById('iSN').textContent=iS;
    document.getElementById('iBN').textContent=iB;
    document.getElementById('iDsp').textContent=nc;
    document.getElementById('iHint').textContent='请输入以「'+nc+'」开头的成语';
    hist.innerHTML=`<div class="idiom-step"><strong>+1</strong><span>「${v}」→ 「${nc}」</span></div>`+hist.innerHTML;
    inp.value='';
  }else{
    iS=0;
    hist.innerHTML=`<div class="idiom-step" style="color:#ff6b6b"><strong style="color:#ff6b6b">×</strong><span>「${v}」无后续，当前：「${iC}」</span></div>`+hist.innerHTML;
    document.getElementById('iSN').textContent='0';inp.value='';
  }
}
