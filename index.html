<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问渠 - 生活中的智慧锦囊</title>
<meta name="description" content="问渠——生活中的智慧锦囊，免费终身使用。运势抽签、成语接龙、房贷计算、诗词壁纸，一个页面全搞定。">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0c18">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%231a1a2e'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%23e8c96a'>渠</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');
:root {
  --bg: #08080f;
  --bg2: #0d0d1a;
  --card: rgba(18, 18, 34, 0.7);
  --card-hover: rgba(26, 26, 48, 0.9);
  --border: rgba(232, 201, 106, 0.12);
  --border-hover: rgba(232, 201, 106, 0.4);
  --gold: #e8c96a;
  --gold2: #c9a84c;
  --gold-pale: #f5e6b0;
  --text: #ede8df;
  --text2: #8a8070;
  --text3: #4a4840;
  --shadow: rgba(232, 201, 106, 0.07);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box }
html { scroll-behavior:smooth }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── 动态背景 ── */
.bg-layer { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.bg-gradient {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 90% 50% at 50% 0%, rgba(232,201,106,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 85% 85%, rgba(74,158,255,0.03) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 10% 60%, rgba(232,168,76,0.04) 0%, transparent 50%),
    linear-gradient(180deg, #08080f 0%, #0d0d1a 60%, #080810 100%);
}
.bg-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(232,201,106,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,201,106,0.022) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 90% 80% at 50% 10%, black 0%, transparent 70%);
}
.bg-float { position:absolute; border-radius:50%; filter:blur(60px); opacity:0.5; animation: floatUp 22s ease-in-out infinite; }
.bg-float:nth-child(1){ width:350px; height:350px; background:radial-gradient(circle,rgba(232,201,106,0.1),transparent 70%); top:5%; left:-5%; animation-duration:28s; }
.bg-float:nth-child(2){ width:280px; height:280px; background:radial-gradient(circle,rgba(74,158,255,0.07),transparent 70%); top:50%; right:-5%; animation-duration:20s; animation-delay:-8s; }
.bg-float:nth-child(3){ width:180px; height:180px; background:radial-gradient(circle,rgba(232,168,76,0.08),transparent 70%); bottom:15%; left:35%; animation-duration:25s; animation-delay:-14s; }
@keyframes floatUp { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-25px) scale(1.05)} }
.bg-drops { position:absolute; inset:0; }
.drop { position:absolute; width:2.5px; height:2.5px; background:rgba(232,201,106,0.25); border-radius:50%; animation: dropFall linear infinite; }
@keyframes dropFall { 0%{transform:translateY(-10px);opacity:0} 20%{opacity:1} 90%{opacity:0.3} 100%{transform:translateY(100vh);opacity:0} }

/* ── 页面结构 ── */
.page { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:0 20px 60px; }

/* Header */
.logo-area { text-align:center; padding:60px 0 36px; position:relative; }
.logo-area::before {
  content:''; position:absolute; top:10px; left:50%; transform:translateX(-50%);
  width:260px; height:260px;
  background:radial-gradient(circle, rgba(232,201,106,0.1) 0%, transparent 70%);
  animation: logoPulse 4s ease-in-out infinite;
}
@keyframes logoPulse { 0%,100%{opacity:0.6;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.1)} }
.logo {
  font-family:'Cormorant Garamond','Noto Serif SC',serif;
  font-size:clamp(3.2rem, 7vw, 5.5rem);
  font-weight:700; letter-spacing:0.12em;
  background:linear-gradient(135deg, var(--gold-pale) 0%, var(--gold) 40%, var(--gold2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  display:inline-block; animation: logoFloat 7s ease-in-out infinite;
  filter:drop-shadow(0 0 28px rgba(232,201,106,0.3));
  position:relative; z-index:1;
}
@keyframes logoFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.logo-en { font-family:'Cormorant Garamond',serif; font-size:0.65rem; letter-spacing:0.5em; color:var(--text3); text-transform:uppercase; margin-top:4px; }
.logo-quote { font-size:0.82rem; color:var(--text2); font-style:italic; margin-top:14px; max-width:380px; margin-left:auto; margin-right:auto; line-height:1.8; }

/* 日期显示 */
.date-bar {
  text-align:center; margin-bottom:36px;
  display:flex; align-items:center; justify-content:center; gap:12px;
}
.date-day {
  font-family:'Cormorant Garamond',serif;
  font-size:2rem; font-weight:700; color:var(--gold);
  text-shadow:0 0 20px rgba(232,201,106,0.4);
  line-height:1;
}
.date-info { font-size:0.72rem; color:var(--text2); text-align:left; line-height:1.5; }
.date-info strong { color:var(--text); display:block; }

/* ── 分区标题 ── */
.section-title {
  font-size:0.68rem; letter-spacing:0.25em; text-transform:uppercase;
  color:var(--text3); text-align:center; margin-bottom:20px;
  display:flex; align-items:center; gap:16px;
}
.section-title::before, .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg, transparent, var(--border), transparent); }

/* ═══════════════════════════════════════════
   自动展示区（零点击可见）
══════════════════════════════════════════ */
.daily-section { margin-bottom:40px; }

/* 历史上今天 */
.history-strip {
  background:var(--card); backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border); border-radius:20px;
  overflow:hidden; margin-bottom:18px;
  transition:border-color 0.3s;
}
.history-strip:hover { border-color:var(--border-hover); }
.history-strip-header {
  padding:14px 20px 12px;
  border-bottom:1px solid rgba(232,201,106,0.07);
  display:flex; align-items:center; gap:8px;
}
.history-strip-header .icon { font-size:1.1rem; }
.history-strip-header .title { font-size:0.85rem; color:var(--text); font-weight:600; }
.history-strip-header .tag {
  margin-left:auto; font-size:0.62rem; padding:3px 9px;
  background:rgba(232,201,106,0.1); color:var(--gold);
  border:1px solid rgba(232,201,106,0.2); border-radius:20px;
  letter-spacing:0.05em;
}
.history-items { padding:8px 0; }
.history-item {
  padding:10px 20px; display:flex; gap:14px; align-items:flex-start;
  transition:background 0.2s; cursor:default;
}
.history-item:hover { background:rgba(232,201,106,0.03); }
.history-year { font-size:0.68rem; font-weight:700; color:var(--gold); min-width:44px; padding-top:2px; }
.history-text { font-size:0.83rem; line-height:1.6; color:var(--text); }
.history-item-sep { padding:0 20px; }
.history-item-sep::before { content:''; display:block; height:1px; background:rgba(232,201,106,0.05); }
.history-more {
  padding:10px 20px; font-size:0.72rem; color:var(--text3);
  cursor:pointer; text-align:center;
  transition:color 0.2s;
  border-top:1px solid rgba(232,201,106,0.05);
}
.history-more:hover { color:var(--gold); }

/* 今日诗词 */
.poem-strip {
  background:var(--card); backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border); border-radius:20px;
  padding:22px 28px; margin-bottom:18px;
  cursor:pointer; transition:all 0.3s;
  position:relative; overflow:hidden;
}
.poem-strip::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity:0.4;
}
.poem-strip:hover { border-color:var(--border-hover); transform:translateY(-2px); box-shadow:0 8px 30px rgba(232,201,106,0.08); }
.poem-strip-header { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.poem-strip-title { font-size:0.85rem; font-weight:600; color:var(--text); }
.poem-body { display:flex; align-items:flex-start; gap:20px; }
.poem-text { font-size:1.05rem; line-height:2.2; letter-spacing:0.1em; color:var(--text); flex:1; }
.poem-meta { font-size:0.72rem; color:var(--text2); min-width:80px; padding-top:4px; text-align:right; }
.poem-refresh-btn {
  font-size:0.7rem; color:var(--text3); margin-top:10px;
  display:inline-flex; align-items:center; gap:4px;
  transition:color 0.2s; cursor:pointer;
}
.poem-refresh-btn:hover { color:var(--gold); }

/* 今日壁纸缩略图 */
.wallpaper-strip {
  background:var(--card); backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border); border-radius:20px;
  overflow:hidden; margin-bottom:18px; display:flex; align-items:center;
  cursor:pointer; transition:all 0.3s;
}
.wallpaper-strip:hover { border-color:var(--border-hover); transform:translateY(-2px); box-shadow:0 8px 30px rgba(232,201,106,0.08); }
.wallpaper-thumb { width:120px; height:80px; object-fit:cover; flex-shrink:0; }
.wallpaper-info { padding:14px 20px; flex:1; }
.wallpaper-title { font-size:0.85rem; font-weight:600; margin-bottom:4px; }
.wallpaper-meta { font-size:0.72rem; color:var(--text2); }
.wallpaper-action { padding:14px 20px; font-size:0.72rem; color:var(--gold); white-space:nowrap; }

/* ── 三栏快速工具行 ── */
.quick-row {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; margin-bottom:18px;
}

/* 运势转盘（首页直接可转） */
.fortune-widget {
  background:var(--card); backdrop-filter:blur(20px);
  border:1px solid var(--border); border-radius:20px;
  padding:18px 16px; text-align:center; position:relative; overflow:hidden;
  transition:all 0.3s;
}
.fortune-widget::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity:0.5;
}
.fortune-widget:hover { border-color:var(--border-hover); box-shadow:0 8px 30px rgba(232,201,106,0.1); }
.fortune-widget-title { font-size:0.78rem; color:var(--text2); margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:6px; }
.fortune-wheel-preview {
  width:90px; height:90px; border-radius:50%; margin:0 auto 12px;
  background:conic-gradient(#e8c96a 0deg 72deg, #4a9eff 72deg 144deg, #6bcb77 144deg 216deg, #a66cff 216deg 288deg, #e74c3c 288deg 360deg);
  position:relative; cursor:pointer; transition:transform 0.3s;
  box-shadow:0 0 0 4px rgba(232,201,106,0.15), 0 0 20px rgba(232,201,106,0.1);
}
.fortune-wheel-preview:hover { transform:scale(1.05); }
.fortune-wheel-preview.spinning { animation:spinWheel 4s cubic-bezier(.2,.8,.3,1); }
@keyframes spinWheel { to{transform:rotate(1800deg)} }
.fortune-wheel-center {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:30px; height:30px; background:linear-gradient(135deg,var(--gold-pale),var(--gold));
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:0.7rem; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.fortune-wheel-center:hover { transform:translate(-50%,-50%) scale(1.1); }
.fortune-result-preview {
  font-size:0.8rem; min-height:1.5em; color:var(--text2); margin-bottom:10px;
  transition:all 0.3s;
}
.fortune-result-preview.has-result { color:var(--gold); font-weight:600; }
.fortune-btn {
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#0c0c18; border:none; padding:8px 18px;
  border-radius:20px; font-size:0.75rem; font-weight:600;
  cursor:pointer; letter-spacing:0.05em; transition:all 0.3s;
  width:100%;
}
.fortune-btn:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(232,201,106,0.3); }
.fortune-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.fortune-today-tips { font-size:0.65rem; color:var(--text3); margin-top:8px; }

/* 今日油价小卡 */
.oil-widget {
  background:var(--card); backdrop-filter:blur(20px);
  border:1px solid var(--border); border-radius:20px;
  padding:18px 16px; transition:all 0.3s;
}
.oil-widget:hover { border-color:var(--border-hover); }
.oil-widget-title { font-size:0.78rem; color:var(--text2); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.oil-prices { display:flex; flex-direction:column; gap:8px; }
.oil-price-row { display:flex; justify-content:space-between; align-items:center; font-size:0.78rem; }
.oil-city { color:var(--text2); }
.oil-p { color:var(--gold); font-weight:600; }
.oil-note { font-size:0.62rem; color:var(--text3); margin-top:8px; }

/* 二十四节气小卡 */
.solar-widget {
  background:var(--card); backdrop-filter:blur(20px);
  border:1px solid var(--border); border-radius:20px;
  padding:18px 16px; transition:all 0.3s;
}
.solar-widget:hover { border-color:var(--border-hover); }
.solar-widget-title { font-size:0.78rem; color:var(--text2); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.solar-current {
  text-align:center; padding:12px;
  background:rgba(232,201,106,0.08); border-radius:12px;
  border:1px solid rgba(232,201,106,0.15);
}
.solar-current-name { font-size:1.4rem; color:var(--gold); font-weight:700; margin-bottom:4px; }
.solar-current-day { font-size:0.68rem; color:var(--text2); }
.solar-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.solar-pill { font-size:0.65rem; padding:3px 8px; border-radius:20px; background:rgba(255,255,255,0.04); color:var(--text3); border:1px solid rgba(255,255,255,0.06); }
.solar-pill.active { background:rgba(232,201,106,0.12); color:var(--gold); border-color:rgba(232,201,106,0.25); }

/* ═══════════════════════════════════════════
   点击使用区
══════════════════════════════════════════ */
.tools-section { margin-top:10px; }

.tools-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
  gap:14px;
}

.tool-card {
  position:relative;
  background:var(--card); backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border); border-radius:16px;
  padding:22px 18px; cursor:pointer; transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  text-decoration:none; color:inherit;
  animation:cardIn 0.5s ease-out both;
}
.tool-card:nth-child(1){animation-delay:0.05s}
.tool-card:nth-child(2){animation-delay:0.1s}
.tool-card:nth-child(3){animation-delay:0.15s}
.tool-card:nth-child(4){animation-delay:0.2s}
.tool-card:nth-child(5){animation-delay:0.25s}
@keyframes cardIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

.tool-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--tool-color, var(--gold)), transparent);
  opacity:0; transition:opacity 0.3s;
}
.tool-card:hover {
  transform:translateY(-5px);
  background:var(--card-hover);
  border-color:var(--border-hover);
  box-shadow:0 16px 48px rgba(232,201,106,0.1), 0 6px 20px rgba(0,0,0,0.4);
}
.tool-card:hover::before { opacity:0.8; }
.tool-icon {
  font-size:1.7rem; margin-bottom:12px;
  width:48px; height:48px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  background:rgba(232,201,106,0.06);
  border:1px solid rgba(232,201,106,0.1);
  transition:all 0.3s;
}
.tool-card:hover .tool-icon { transform:scale(1.08); background:rgba(232,201,106,0.1); }
.tool-name { font-size:0.9rem; font-weight:600; margin-bottom:6px; }
.tool-desc { font-size:0.72rem; color:var(--text2); line-height:1.55; }
.tool-arrow {
  position:absolute; bottom:16px; right:16px;
  font-size:0.75rem; color:var(--text3);
  opacity:0; transform:translateX(-4px);
  transition:all 0.3s;
}
.tool-card:hover .tool-arrow { opacity:1; transform:translateX(0); color:var(--gold); }

/* ── 底部 ── */
.footer { text-align:center; padding:40px 20px 20px; position:relative; z-index:1; }
.footer::before { content:''; display:block; width:40px; height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin:0 auto 20px; }
.footer-text { font-size:0.7rem; color:var(--text3); letter-spacing:0.1em; }

/* ═══════════════════════════════════════════
   模态框
══════════════════════════════════════════ */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(4,4,10,0.9); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); z-index:1000; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.2s ease; }
.modal-overlay.active { display:flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background:rgba(12,12,24,0.97); backdrop-filter:blur(30px) saturate(150%);
  border:1px solid rgba(232,201,106,0.1); border-radius:24px;
  width:100%; max-width:660px; max-height:88vh; overflow-y:auto;
  box-shadow:0 0 0 1px rgba(232,201,106,0.05), 0 40px 100px rgba(0,0,0,0.6);
  animation:slideUp 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
}
@keyframes slideUp { from{opacity:0;transform:translateY(30px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-track{background:transparent}
.modal::-webkit-scrollbar-thumb{background:rgba(232,201,106,0.2);border-radius:2px}
.modal-header { padding:22px 26px 18px; border-bottom:1px solid rgba(232,201,106,0.07); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:rgba(12,12,24,0.97); backdrop-filter:blur(20px); z-index:10; border-radius:24px 24px 0 0; }
.modal-title { font-size:1rem; font-weight:600; color:var(--text); display:flex; align-items:center; gap:10px; }
.modal-close { background:rgba(232,201,106,0.07); border:1px solid rgba(232,201,106,0.1); color:var(--text2); font-size:1.1rem; cursor:pointer; padding:0; width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; line-height:1; }
.modal-close:hover{background:rgba(232,201,106,0.15);color:var(--gold);border-color:rgba(232,201,106,0.25)}
.modal-body { padding:26px; animation:contentIn 0.3s ease 0.1s both; }
@keyframes contentIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* 模态框内工具样式 */
.calc-wrap { max-width:440px; margin:0 auto; }
.calc-row-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.calc-group { margin-bottom:14px; }
.calc-label { font-size:0.72rem; color:var(--text2); margin-bottom:8px; letter-spacing:0.04em; }
.calc-input { width:100%; padding:13px 16px; background:rgba(8,8,15,0.8); border:1px solid rgba(232,201,106,0.12); border-radius:12px; color:var(--text); font-size:0.92rem; outline:none; transition:all 0.3s; appearance:none; -webkit-appearance:none; }
.calc-input:focus{background:rgba(10,10,20,0.9);border-color:rgba(232,201,106,0.4);box-shadow:0 0 16px rgba(232,201,106,0.08)}
.calc-input option{background:#0d0d1a;color:var(--text)}
.calc-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#0c0c18; border:none; border-radius:14px; font-weight:700; font-size:0.95rem; cursor:pointer; letter-spacing:0.08em; transition:all 0.3s; box-shadow:0 4px 16px rgba(232,201,106,0.2); }
.calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,201,106,0.35)}
.calc-result { margin-top:18px; padding:18px; background:rgba(232,201,106,0.04); border:1px solid rgba(232,201,106,0.1); border-radius:16px; font-size:0.85rem; line-height:2; }
.calc-result strong{color:var(--gold)}
.calc-result .hl{color:var(--gold);font-size:1.3rem;font-weight:700}

/* BMI */
.bmi-result { margin-top:18px; text-align:center; }

.bmi-bar { height:7px;border-radius:4px;background:rgba(255,255,255,0.07);margin:12px 0;overflow:hidden }
.bmi-bar-fill { height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(.25,.46,.45,.94) }
.bmi-scale { display:flex;justify-content:space-between;font-size:0.65rem;color:var(--text3);margin-top:6px }

/* 成语接龙 */
.idiom-game { max-width:500px;margin:0 auto;text-align:center }
.idiom-score { display:flex;gap:24px;justify-content:center;margin-bottom:22px;padding:12px 22px;background:rgba(232,201,106,0.05);border:1px solid rgba(232,201,106,0.1);border-radius:14px;font-size:0.85rem }
.idiom-score strong{color:var(--gold);font-size:1.1rem}
.idiom-display { font-size:3rem;font-weight:700;color:var(--gold);margin:18px 0;letter-spacing:0.3em;text-shadow:0 0 24px rgba(232,201,106,0.3);animation:charPulse 2s ease-in-out infinite }
@keyframes charPulse { 0%,100%{text-shadow:0 0 20px rgba(232,201,106,0.2)} 50%{text-shadow:0 0 40px rgba(232,201,106,0.5)} }
.idiom-hint { font-size:0.78rem;color:var(--text2);margin-bottom:18px }
.idiom-input { width:100%;padding:13px 16px;background:rgba(8,8,15,0.8);border:1px solid rgba(232,201,106,0.13);border-radius:14px;color:var(--text);font-size:1rem;text-align:center;outline:none;transition:all 0.3s;letter-spacing:0.1em }
.idiom-input:focus{border-color:rgba(232,201,106,0.5);box-shadow:0 0 18px rgba(232,201,106,0.08)}
.idiom-input::placeholder{color:var(--text3);letter-spacing:0.05em}
.idiom-btn { background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0c0c18;border:none;padding:12px 32px;border-radius:50px;font-weight:600;font-size:0.88rem;cursor:pointer;margin-top:14px;transition:all 0.3s }
.idiom-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(232,201,106,0.28)}
.idiom-history { margin-top:20px;text-align:left;max-height:200px;overflow-y:auto;padding:0 4px }
.idiom-history::-webkit-scrollbar{width:3px}
.idiom-history::-webkit-scrollbar-thumb{background:rgba(232,201,106,0.15);border-radius:2px}
.idiom-step { font-size:0.75rem;color:var(--text2);padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:8px;animation:stepIn 0.3s ease }
@keyframes stepIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
.idiom-step strong{color:var(--gold);font-family:monospace;min-width:40px }

/* 油价大卡片 */
.oil-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-top:14px }
.oil-card { background:rgba(232,201,106,0.04);border:1px solid rgba(232,201,106,0.1);border-radius:14px;padding:16px 10px;text-align:center;transition:all 0.3s }

// ═══════════════════════════════════════════
const FORTUNES = [
  {rank:'🌟 大吉', color:'#e8c96a', desc:'今日诸事顺遂，宜大胆行动。机遇降临，把握时机将收获满满。'},

  {rank:'😐 平', color:'#4a9eff', desc:'今日中规中矩，静心守成为上。避免激进决策，多倾听他人意见。'},
  {rank:'😟 凶', color:'#a66cff', desc:'今日需谨慎行事，忌冒险冲动。遇事先冷静，退一步海阔天空。'},
  {rank:'💀 大凶', color:'#e74c3c', desc:'今日低谷，能量低沉，宜静不宜动。避免做重大决定，多休息早睡眠。'},
];

const STORAGE_KEY = 'wenqu_fortune';
let fortuneSpinning = false;

function initHomeFortune(){
  const today = new Date().toDateString();
  const stored = localStorage.getItem(STORAGE_KEY);
  if(stored){
    const data = JSON.parse(stored);
    if(data.date === today){
      const el = document.getElementById('homeFortuneResult');
      const btn = document.getElementById('homeFortuneBtn');
      const tips = document.getElementById('homeFortuneTips');
      if(el) el.textContent = data.rank;
      if(btn){ btn.textContent = '今日已抽 ('+data.rank.split(' ')[1]+')'; btn.disabled=true; }
      if(tips) tips.textContent = data.desc;
    }
  }
}

function spinHomeFortune(){
  if(fortuneSpinning) return;
  const today = new Date().toDateString();
  const stored = localStorage.getItem(STORAGE_KEY);
  if(stored && JSON.parse(stored).date === today){
    // 已经抽过了
    return;
  }
  const wheel = document.getElementById('homeFortuneWheel');
  const btn = document.getElementById('homeFortuneBtn');
  const result = document.getElementById('homeFortuneResult');
  if(!wheel || !btn || !result) return;
  fortuneSpinning = true;
  btn.disabled = true;
  btn.textContent = '命运转盘中...';
  result.textContent = '...';

  const deg = 1800 + Math.floor(Math.random()*1800);
  const segs = FORTUNES.length;
  const segAngle = 360/segs;
  wheel.style.transition = 'transform 4.5s cubic-bezier(.2,.8,.3,1)';
  wheel.style.transform = `rotate(${deg}deg)`;

  setTimeout(()=>{
    const normalized = ((deg%360)+segAngle/2)%360;
    const idx = Math.floor(normalized/segAngle);
    const finalIdx = (segs-idx)%segs;
    const f = FORTUNES[finalIdx];
    result.textContent = f.rank;
    result.classList.add('has-result');
    btn.textContent = '今日已抽 ('+f.rank.split(' ')[1]+')';
    document.getElementById('homeFortuneTips').textContent = f.desc;

    // 保存到localStorage
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      date: today,
      rank: f.rank,
      desc: f.desc,
      color: f.color
    }));
    fortuneSpinning = false;
  }, 4600);
}

initHomeFortune();

const modal=document.getElementById('modal');
const modalTitle=document.getElementById('modalTitle');
const modalBody=document.getElementById('modalBody');

function openModal(title,body){
  modalTitle.textContent=title;
  modalBody.innerHTML=body;
  modal.classList.add('active');
  document.body.style.overflow='hidden';
}
function closeModal(){
  modal.classList.remove('active');
  document.body.style.overflow='';
}
document.getElementById('modalCloseBtn').addEventListener('click',closeModal);
modal.addEventListener('click',e=>{ if(e.target===modal) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// 房贷计算器（模态框）
// ═══════════════════════════════════════════
function calcHTML(){
  return `<div class="calc-wrap">
  <div class="calc-row-grid">
    <div class="calc-group"><div class="calc-label">贷款金额（万元）</div><input class="calc-input" id="calcAmount" type="number" value="100" min="1"></div>
    <div class="calc-group"><div class="calc-label">贷款年限</div><select class="calc-input" id="calcYears"><option value="5">5年</option><option value="10">10年</option><option value="15">15年</option><option value="20" selected>20年</option><option value="25">25年</option><option value="30">30年</option></select></div>
  </div>
  <div class="calc-group"><div class="calc-label">贷款类型</div><select class="calc-input" id="calcType"><option value="gjj">公积金贷款（3.1%）</option><option value="sd" selected>商业贷款（4.3%）</option><option value="mix">组合贷（各50%）</option></select></div>
  <div class="calc-row-grid">
    <div class="calc-group"><div class="calc-label">商贷利率（%）</div><input class="calc-input" id="calcRate" type="number" value="4.3" step="0.01"></div>
    <div class="calc-group"><div class="calc-label">公积金利率（%）</div><input class="calc-input" id="calcRate2" type="number" value="3.1" step="0.01"></div>
  </div>
  <button class="calc-btn" onclick="runCalc()">计算月供</button>
  <div class="calc-result" id="calcResult">点击按钮计算月供详情</div>
</div>`;
}
function runCalc(){
  const amt=parseFloat(document.getElementById('calcAmount').value)*10000;
  const yrs=parseInt(document.getElementById('calcYears').value);
  const type=document.getElementById('calcType').value;
  const r=parseFloat(document.getElementById('calcRate').value)/100;
  const r2=parseFloat(document.getElementById('calcRate2').value)/100;
  const mo=yrs*12;
  const fmt=n=>'¥'+Math.round(n).toLocaleString();
  let res='';
  if(type==='gjj'){
    const m=amt*(r2/12*Math.pow(1+r2/12,mo))/(Math.pow(1+r2/12,mo)-1);
    const t=m*mo, i=t-amt;
    res=`<strong>公积金贷款</strong><br>本金：${fmt(amt)} · ${yrs}年 · ${(r2*100).toFixed(2)}%<br><br><span class="hl">月供 ${fmt(m)}</span><br>总利息：${fmt(i)} · 共还：<strong>${fmt(t)}</strong>`;
  } else if(type==='sd'){
    const m=amt*(r/12*Math.pow(1+r/12,mo))/(Math.pow(1+r/12,mo)-1);
    const t=m*mo, i=t-amt;
    res=`<strong>商业贷款</strong><br>本金：${fmt(amt)} · ${yrs}年 · ${(r*100).toFixed(2)}%<br><br><span class="hl">月供 ${fmt(m)}</span><br>总利息：${fmt(t-amt)} · 共还：<strong>${fmt(t)}</strong>`;
  } else {
    const h=amt/2;
    const m1=h*(r2/12*Math.pow(1+r2/12,mo))/(Math.pow(1+r2/12,mo)-1);
    const m2=h*(r/12*Math.pow(1+r/12,mo))/(Math.pow(1+r/12,mo)-1);
    const t=(m1+m2)*mo;
    res=`<strong>组合贷款</strong>（各50%）<br>本金：${fmt(amt)} · ${yrs}年<br><br>公积金：${fmt(h)} → ${fmt(m1)}/月<br>商　贷：${fmt(h)} → ${fmt(m2)}/月<br><br><span class="hl">合计月供 ${fmt(m1+m2)}</span><br>总利息：${fmt(t-amt)}`;
  }
  document.getElementById('calcResult').innerHTML=res;
}

function carHTML(){
  return `<div class="calc-wrap">
  <div class="calc-row-grid">
    <div class="calc-group"><div class="calc-label">车价（万元）</div><input class="calc-input" id="carPrice" type="number" value="15" min="1"></div>
    <div class="calc-group"><div class="calc-label">贷款年限</div><select class="calc-input" id="carYears"><option value="1">1年</option><option value="2" selected>2年</option><option value="3">3年</option><option value="4">4年</option><option value="5">5年</option></select></div>
  </div>
  <div class="calc-row-grid">
    <div class="calc-group"><div class="calc-label">首付比例（%）</div><input class="calc-input" id="carDown" type="number" value="30" min="10" max="80"></div>
    <div class="calc-group"><div class="calc-label">贷款利率（%）</div><input class="calc-input" id="carRate" type="number" value="4.75" step="0.01"></div>
  </div>
  <div class="calc-group"><div class="calc-label">还款方式</div><select class="calc-input" id="carType"><option value="benxi">等额本息（月供固定）</option><option value="benjin">等额本金（逐月递减）</option></select></div>
  <button class="calc-btn" onclick="runCarCalc()">计算车贷</button>
  <div class="calc-result" id="carResult">点击按钮计算</div>
</div>`;
}
function runCarCalc(){
  const price=parseFloat(document.getElementById('carPrice').value)*10000;
  const yrs=parseInt(document.getElementById('carYears').value);
  const down=parseFloat(document.getElementById('carDown').value)/100;
  const rate=parseFloat(document.getElementById('carRate').value)/100;
  const type=document.getElementById('carType').value;
  const mo=yrs*12;
  const downPayment=price*down;
  const loan=price-downPayment;
  const fmt=n=>'¥'+Math.round(n).toLocaleString();
  let res='';
  if(type==='benxi'){
    const m=loan*(rate/12*Math.pow(1+rate/12,mo))/(Math.pow(1+rate/12,mo)-1);
    const t=m*mo, interest=t-loan;
    res=`<strong>等额本息</strong><br>车价：${fmt(price)} · 首付：${fmt(downPayment)}（${(down*100).toFixed(0)}%）<br>贷款本金：<strong>${fmt(loan)}</strong> · ${yrs}年 · ${(rate*100).toFixed(2)}%<br><br><span class="hl">月供 ${fmt(m)}</span>（每月相同）<br>总利息：${fmt(interest)} · 共还：<strong>${fmt(t+downPayment)}</strong>`;
  } else {
    const principal=loan/mo;
    const firstInterest=loan*rate/12;
    const lastInterest=principal*rate/12;
    const avgM=(principal+(firstInterest+lastInterest)/2);
    const totalInterest=loan*rate*(yrs+0.5)/2;
    res=`<strong>等额本金</strong><br>车价：${fmt(price)} · 首付：${fmt(downPayment)}（${(down*100).toFixed(0)}%）<br>贷款本金：<strong>${fmt(loan)}</strong> · ${yrs}年 · ${(rate*100).toFixed(2)}%<br><br>首月月供：<span class="hl">${fmt(principal+firstInterest)}</span> · 末月：约${fmt(principal+lastInterest)}<br>（每月递减约 ${fmt(loan*rate/12/mo)}）<br>总利息：${fmt(totalInterest)}`;
  }
  document.getElementById('carResult').innerHTML=res;
}

// ═══════════════════════════════════════════
// BMI计算器
// ═══════════════════════════════════════════
function bmiHTML(){
  return `<div class="calc-wrap">
  <div class="calc-row-grid">
    <div class="calc-group"><div class="calc-label">身高（cm）</div><input class="calc-input" id="bmiH" type="number" placeholder="170"></div>
    <div class="calc-group"><div class="calc-label">体重（kg）</div><input class="calc-input" id="bmiW" type="number" placeholder="65"></div>
  </div>
  <button class="calc-btn" onclick="runBMI()">计算BMI</button>
  <div class="bmi-result" id="bmiResult" style="display:none"></div>
</div>`;
}
function runBMI(){
  const h=parseFloat(document.getElementById('bmiH').value)/100;
  const w=parseFloat(document.getElementById('bmiW').value);
  if(!h||!w||h<=0||w<=0){alert('请输入有效身高和体重');return;}
  const bmi=w/(h*h);
  let label,color,tip;
  if(bmi<18.5){label='偏瘦';color='#3498db';tip='适当增重，保持营养均衡'}
  else if(bmi<24){label='正常';color='#27ae60';tip='继续保持！体型保持得很好'}
  else if(bmi<28){label='偏胖';color='#f39c12';tip='注意饮食结构，减少高热量，增加运动'}
  else{label='肥胖';color='#e74c3c';tip='建议咨询专业医生，制定科学减重计划'}
  const pct=Math.min(Math.max((bmi-15)/(30-15)*100,2),98);
  const el=document.getElementById('bmiResult');
  el.style.display='block';
  el.innerHTML=`<div class="bmi-num" style="color:${color}">${bmi.toFixed(1)}</div>
  <div class="bmi-label" style="color:${color}">${label}</div>
  <div class="bmi-tip">${tip}</div>
  <div class="bmi-bar"><div class="bmi-bar-fill" style="width:${pct}%;background:${color}"></div></div>
  <div class="bmi-scale"><span>偏瘦&lt;18.5</span><span>正常 18.5-24</span><span>偏胖 24-28</span><span>肥胖&gt;28</span></div>`;
}

  '海':['海阔天空','海枯石烂','海誓山盟'],
  '天':['天高云淡','天翻地覆','天经地义','天涯海角'],
  '涯':['天涯海角'],
  '角':[],
};
let iScore=0, iBest=0, iChar='成';
function idiomHTML(){return `<div class="idiom-game">
  <div class="idiom-score"><span>本局 <strong id="iScoreNum">0</strong> 分</span><span>最高 <strong id="iBestNum">0</strong> 分</span></div>
  <div class="idiom-display" id="iDisplay">成</div>
  <div class="idiom-hint" id="iHint">请输入以「成」开头的成语</div>
  <input class="idiom-input" id="iInput" placeholder="输入成语后按回车" autocomplete="off">
  <button class="idiom-btn" onclick="checkIdiom({key:'Enter'})">确认接龙</button>
  <div class="idiom-history" id="iHistory"></div>
</div>`;}
function checkIdiom(e){
  if(e.key!=='Enter')return;
  const inp=document.getElementById('iInput');
  if(!inp)return;
  const v=inp.value.trim();
  if(!v||v.length<4)return;
  if(!v.startsWith(iChar)){
    inp.style.animation='none';inp.offsetHeight;inp.style.animation='shake 0.4s ease';setTimeout(()=>inp.style.animation='',400);
    return;
  }
  const nc=v[v.length-1];
  const hist=document.getElementById('iHistory');
  if(IDIOMS[nc]){
    iScore++;if(iScore>iBest)iBest=iScore;
    iChar=nc;
    document.getElementById('iScoreNum').textContent=iScore;
    document.getElementById('iBestNum').textContent=iBest;
    document.getElementById('iDisplay').textContent=nc;
    document.getElementById('iHint').textContent='请输入以「'+nc+'」开头的成语';
    hist.innerHTML=`<div class="idiom-step"><strong>+1</strong><span>「${v}」→ 「${nc}」</span></div>`+hist.innerHTML;
    inp.value='';
  }else{
    iScore=0;
    hist.innerHTML=`<div class="idiom-step" style="color:#e74c3c"><strong style="color:#e74c3c">×</strong><span>「${v}」无后续，当前：「${iChar}」</span></div>`+hist.innerHTML;
    document.getElementById('iScoreNum').textContent='0';inp.value='';
  }
}
