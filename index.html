<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问渠 - 生活中的智慧锦囊</title>
<meta name="description" content="问渠——生活中的智慧锦囊，永久免费。个税计算、老黄历宜忌、天气预报、房贷计算、诗词壁纸，一个页面全搞定。">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0c18">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%231a1a2e'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%23e8c96a'>渠</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');
:root{
  --bg:#08080f;--bg2:#0d0d1a;--gold:#e8c96a;--gold2:#c9a84c;--gold-pale:#f5e6b0;
  --gold-dim:rgba(232,201,106,0.4);--text:#ede8df;--text2:#9a9080;--text3:#5a5448;
  --blue:#6ab0ff;--green:#6bcb77;--red:#ff6b6b;--purple:#b06aff;
  --border:rgba(232,201,106,0.1);--border-hover:rgba(232,201,106,0.35);
  --card-bg:rgba(14,14,28,0.75);--card-hover:rgba(20,20,40,0.92);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Serif SC','PingFang SC','Microsoft YaHei',serif;
  min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
}

/* 背景 */
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse 100% 60% at 50% -10%,rgba(232,201,106,0.09) 0%,transparent 60%),radial-gradient(ellipse 70% 50% at 90% 90%,rgba(74,130,255,0.04) 0%,transparent 55%),linear-gradient(175deg,#07070e 0%,#0b0b1a 40%,#080810 100%)}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(232,201,106,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(232,201,106,0.018) 1px,transparent 1px);background-size:72px 72px;mask-image:radial-gradient(ellipse 95% 80% at 50% 0%,black 0%,transparent 65%)}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.5;animation:orbFloat 25s ease-in-out infinite}
.bg-orb:nth-child(1){width:500px;height:500px;background:radial-gradient(circle,rgba(232,201,106,0.12),transparent 70%);top:-10%;left:-10%;animation-duration:32s}
.bg-orb:nth-child(2){width:380px;height:380px;background:radial-gradient(circle,rgba(74,130,255,0.07),transparent 70%);top:40%;right:-8%;animation-duration:24s;animation-delay:-9s}
.bg-orb:nth-child(3){width:250px;height:250px;background:radial-gradient(circle,rgba(200,150,60,0.09),transparent 70%);bottom:10%;left:25%;animation-duration:28s;animation-delay:-15s}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-35px) scale(1.07)}}
.bg-drops{position:absolute;inset:0}
.drop{position:absolute;width:2px;height:2px;background:rgba(232,201,106,0.3);border-radius:50%;animation:dropFall linear infinite}
@keyframes dropFall{0%{transform:translateY(-10px);opacity:0}20%{opacity:1}90%{opacity:0.2}100%{transform:translateY(100vh);opacity:0}}

.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px 60px}

/* Header */
.site-header{padding:56px 0 40px;text-align:center;position:relative}
.site-header::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:320px;height:320px;background:radial-gradient(circle,rgba(232,201,106,0.12) 0%,transparent 65%);pointer-events:none;animation:pulseGlow 5s ease-in-out infinite}
@keyframes pulseGlow{0%,100%{opacity:0.7;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.15)}}
.logo{display:inline-block;position:relative}
.logo-hanzi{font-family:'Cormorant Garamond','Noto Serif SC',serif;font-size:clamp(4rem,9vw,7rem);font-weight:700;letter-spacing:0.08em;background:linear-gradient(160deg,#f5e6b0 0%,#e8c96a 30%,#c9a84c 60%,#e8c96a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:logoFloat 7s ease-in-out infinite;filter:drop-shadow(0 0 40px rgba(232,201,106,0.35));line-height:1}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.logo-en{font-family:'Cormorant Garamond',serif;font-size:0.72rem;letter-spacing:0.6em;color:var(--text3);text-transform:uppercase;margin-top:6px}
.logo-subtitle{font-size:0.9rem;color:var(--text2);margin-top:16px;font-style:italic;max-width:420px;margin-left:auto;margin-right:auto;line-height:1.9;letter-spacing:0.04em}
.logo-source{font-size:0.7rem;color:var(--text3);margin-top:8px;letter-spacing:0.08em}
.logo-badge{display:inline-flex;align-items:center;gap:6px;margin-top:18px;padding:6px 16px;background:rgba(232,201,106,0.08);border:1px solid rgba(232,201,106,0.2);border-radius:20px;font-size:0.68rem;color:var(--gold);letter-spacing:0.08em}
.logo-badge span{color:var(--text2)}

/* 日期条 */
.date-strip{display:flex;align-items:center;justify-content:center;gap:20px;padding:14px 24px;background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;margin-bottom:36px;position:relative;overflow:hidden}
.date-strip::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
.date-big{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--gold);text-shadow:0 0 20px rgba(232,201,106,0.5);line-height:1}
.date-meta{font-size:0.75rem;color:var(--text2);line-height:1.5}
.date-lunar{color:var(--text3);font-size:0.68rem}
.date-sep{width:1px;height:32px;background:rgba(232,201,106,0.12)}
.weather-bar{display:flex;align-items:center;gap:14px;margin-left:auto}
.weather-bar .w-city{font-size:0.75rem;color:var(--text2)}
.weather-bar .w-temp{font-size:0.85rem;font-weight:600;color:var(--text)}
.weather-bar .w-icon{font-size:1.1rem}

/* 分区标题 */
.section-head{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.section-head::before,.section-head::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
.section-label{font-size:0.65rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--text3);white-space:nowrap}

/* ═══ 自动展示区 ═══ */
.daily-section{margin-bottom:44px}

/* 五宫格 */
.five-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:16px;margin-top:16px}
.cell-a{grid-column:1/2;grid-row:1/3}
.cell-b{grid-column:2/4;grid-row:1}
.cell-c{grid-column:2/4;grid-row:2}

/* 运势大卡 */
.fortune-card{background:var(--card-bg);backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--border);border-radius:24px;padding:28px;height:100%;position:relative;overflow:hidden;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94)}
.fortune-card:hover{border-color:var(--border-hover);transform:translateY(-4px);box-shadow:0 20px 60px rgba(232,201,106,0.1)}
.fortune-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#e8c96a,transparent);opacity:0.6}
.fortune-card::after{content:'';position:absolute;right:-20px;bottom:-20px;width:200px;height:200px;background:radial-gradient(circle,rgba(232,201,106,0.06) 0%,transparent 70%);pointer-events:none}
.fortune-title{font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.fortune-title span{color:var(--text3);font-weight:400;font-size:0.72rem}
.fortune-wheel-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.fortune-wheel{width:130px;height:130px;border-radius:50%;background:conic-gradient(#e8c96a 0deg 72deg,#6ab0ff 72deg 144deg,#6bcb77 144deg 216deg,#b06aff 216deg 288deg,#ff6b6b 288deg 360deg);position:relative;cursor:pointer;flex-shrink:0;box-shadow:0 0 0 5px rgba(232,201,106,0.15),0 0 0 9px rgba(232,201,106,0.04),0 0 40px rgba(232,201,106,0.12),inset 0 0 30px rgba(0,0,0,0.3);transition:transform 0.3s,box-shadow 0.3s}
.fortune-wheel:hover{transform:scale(1.04);box-shadow:0 0 0 6px rgba(232,201,106,0.25),0 0 0 10px rgba(232,201,106,0.06),0 0 60px rgba(232,201,106,0.2),inset 0 0 30px rgba(0,0,0,0.3)}
.fortune-wheel.spinning{animation:spinBig 4.5s cubic-bezier(.2,.8,.3,1)}
@keyframes spinBig{to{transform:rotate(1980deg)}}
.fortune-ct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;background:linear-gradient(135deg,#f5e6b0,#e8c96a,#c9a84c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.4),0 0 24px rgba(232,201,106,0.4);transition:all 0.2s;z-index:2}
.fortune-ct:hover{transform:translate(-50%,-50%) scale(1.1);box-shadow:0 6px 20px rgba(0,0,0,0.4),0 0 36px rgba(232,201,106,0.5)}
.fortune-info{flex:1;min-width:160px}
.fortune-result{font-size:1.5rem;font-weight:700;margin-bottom:8px;min-height:2rem;letter-spacing:0.04em}
.fortune-desc{font-size:0.8rem;color:var(--text2);line-height:1.8;margin-bottom:14px;min-height:3em}
.fortune-btn{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#e8c96a,#c9a84c);color:#0c0c18;border:none;padding:10px 22px;border-radius:50px;font-size:0.82rem;font-weight:700;cursor:pointer;letter-spacing:0.06em;transition:all 0.3s;box-shadow:0 4px 16px rgba(232,201,106,0.25)}
.fortune-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,201,106,0.4)}
.fortune-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none}
.fortune-tips{font-size:0.68rem;color:var(--text3);margin-top:10px}

/* 诗词+历史 */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;height:100%}
.poem-card{background:var(--card-bg);backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--border);border-radius:24px;padding:24px;cursor:pointer;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);position:relative;overflow:hidden}
.poem-card:hover{border-color:var(--border-hover);transform:translateY(-4px);box-shadow:0 16px 50px rgba(232,201,106,0.08),0 6px 20px rgba(0,0,0,0.4)}
.poem-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#e8c96a80,transparent)}
.poem-eyebrow{font-size:0.7rem;color:var(--text3);letter-spacing:0.15em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.poem-title{font-size:1.2rem;color:var(--gold-pale);font-weight:600;margin-bottom:4px;letter-spacing:0.06em}
.poem-author{font-size:0.7rem;color:var(--text3);margin-bottom:16px;letter-spacing:0.06em}
.poem-content{font-size:0.88rem;line-height:2.2;letter-spacing:0.1em;color:var(--text2);white-space:pre-line}
.poem-refresh{font-size:0.68rem;color:var(--text3);margin-top:14px;display:inline-flex;align-items:center;gap:4px;transition:color 0.2s}
.poem-card:hover .poem-refresh{color:var(--gold)}

.history-card{background:var(--card-bg);backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--border);border-radius:24px;padding:24px;cursor:pointer;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);position:relative;overflow:hidden}
.history-card:hover{border-color:var(--border-hover);transform:translateY(-4px);box-shadow:0 16px 50px rgba(106,176,255,0.08),0 6px 20px rgba(0,0,0,0.4)}
.history-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#6ab0ff80,transparent)}
.history-card-title{font-size:0.7rem;color:var(--text3);letter-spacing:0.15em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.history-badge{font-size:0.62rem;padding:3px 9px;background:rgba(106,176,255,0.1);color:var(--blue);border:1px solid rgba(106,176,255,0.2);border-radius:20px;margin-left:auto}
.history-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.history-item:last-child{border-bottom:none}
.history-year{font-size:0.65rem;font-weight:700;color:var(--blue);min-width:40px;padding-top:2px;opacity:0.8}
.history-text{font-size:0.8rem;line-height:1.6;color:var(--text2)}
.history-sep{height:1px;background:rgba(255,255,255,0.04);margin:4px 0}
.history-more{font-size:0.7rem;color:var(--text3);margin-top:10px;display:inline-flex;align-items:center;gap:4px;transition:color 0.2s}
.history-card:hover .history-more{color:var(--blue)}

/* 老黄历 */
.hl-card{background:var(--card-bg);backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--border);border-radius:24px;padding:24px;height:100%;position:relative;overflow:hidden;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94)}
.hl-card:hover{border-color:var(--border-hover);transform:translateY(-4px);box-shadow:0 16px 50px rgba(6,188,120,0.08),0 6px 20px rgba(0,0,0,0.4)}
.hl-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#27ae6080,transparent)}
.hl-title{font-size:0.7rem;color:var(--text3);letter-spacing:0.15em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.hl-lunar{font-size:1rem;color:var(--text);margin-bottom:16px;font-weight:600}
.hl-good{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.hl-tag{display:inline-flex;align-items:center;gap:4px;font-size:0.7rem;padding:3px 9px;border-radius:20px}
.hl-tag.good{background:rgba(39,174,96,0.12);color:var(--green);border:1px solid rgba(39,174,96,0.25)}
.hl-tag.avoid{background:rgba(255,107,107,0.1);color:var(--red);border:1px solid rgba(255,107,107,0.2)}
.hl-suggest{font-size:0.75rem;color:var(--text2);line-height:1.7}
.hl-ico{font-size:1.2rem;margin-right:6px}

/* ═══ 工具区 ═══ */
.tools-section{margin-top:10px}
.tools-main{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.tool-card{background:var(--card-bg);backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--border);border-radius:22px;padding:24px 20px;cursor:pointer;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);text-decoration:none;color:inherit;position:relative;overflow:hidden;animation:cardIn 0.5s ease-out both}
.tool-card:nth-child(1){animation-delay:0.05s}.tool-card:nth-child(2){animation-delay:0.1s}.tool-card:nth-child(3){animation-delay:0.15s}.tool-card:nth-child(4){animation-delay:0.2s}.tool-card:nth-child(5){animation-delay:0.25s}.tool-card:nth-child(6){animation-delay:0.3s}
.tool-card:nth-child(7){animation-delay:0.35s}.tool-card:nth-child(8){animation-delay:0.4s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.tool-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--tool-color,#e8c96a),transparent);opacity:0;transition:opacity 0.35s}
.tool-card:hover{border-color:var(--border-hover);transform:translateY(-6px);box-shadow:0 20px 60px rgba(232,201,106,0.12),0 8px 28px rgba(0,0,0,0.45);background:var(--card-hover)}
.tool-card:hover::before{opacity:0.8}
.tool-icon{font-size:2rem;margin-bottom:14px;width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:rgba(232,201,106,0.06);border:1px solid rgba(232,201,106,0.1);transition:all 0.3s}
.tool-card:hover .tool-icon{transform:scale(1.1);background:rgba(232,201,106,0.12)}
.tool-name{font-size:0.95rem;font-weight:600;margin-bottom:6px;letter-spacing:0.02em}
.tool-desc{font-size:0.75rem;color:var(--text2);line-height:1.6}
.tool-arrow{position:absolute;bottom:18px;right:18px;font-size:0.78rem;color:var(--text3);opacity:0;transform:translateX(-4px);transition:all 0.3s}
.tool-card:hover .tool-arrow{opacity:1;transform:translateX(0);color:var(--gold)}

/* Footer */
.site-footer{text-align:center;padding:48px 0 24px;position:relative}
.site-footer::before{content:'';display:block;width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0 auto 20px}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;background:linear-gradient(135deg,var(--gold-pale),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.footer-text{font-size:0.68rem;color:var(--text3);letter-spacing:0.12em}

/* 模态框 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(4,4,10,0.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:1000;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease}
.modal-overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:rgba(11,11,22,0.98);backdrop-filter:blur(32px) saturate(180%);border:1px solid rgba(232,201,106,0.1);border-radius:28px;width:100%;max-width:680px;max-height:88vh;overflow-y:auto;box-shadow:0 40px 120px rgba(0,0,0,0.7);animation:slideUp 0.3s cubic-bezier(0.25,0.46,0.45,0.94)}
@keyframes slideUp{from{opacity:0;transform:translateY(30px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal::-webkit-scrollbar{width:4px}.modal::-webkit-scrollbar-track{background:transparent}.modal::-webkit-scrollbar-thumb{background:rgba(232,201,106,0.2);border-radius:2px}
.modal-hdr{padding:24px 28px 20px;border-bottom:1px solid rgba(232,201,106,0.07);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(11,11,22,0.98);backdrop-filter:blur(20px);z-index:10;border-radius:28px 28px 0 0}
.modal-title{font-size:1rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:10px}
.modal-close{background:rgba(232,201,106,0.07);border:1px solid rgba(232,201,106,0.1);color:var(--text2);font-size:1.1rem;cursor:pointer;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;line-height:1}
.modal-close:hover{background:rgba(232,201,106,0.15);color:var(--gold);border-color:rgba(232,201,106,0.25)}
.modal-body{padding:28px;animation:contentIn 0.3s ease 0.1s both}
@keyframes contentIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 表单 */
.calc-wrap{max-width:460px;margin:0 auto}
.calc-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.calc-grp{margin-bottom:14px}
.calc-lbl{font-size:0.72rem;color:var(--text2);margin-bottom:8px;letter-spacing:0.04em}
.calc-input{width:100%;padding:13px 16px;background:rgba(6,6,14,0.85);border:1px solid rgba(232,201,106,0.1);border-radius:12px;color:var(--text);font-size:0.92rem;outline:none;transition:all 0.3s;appearance:none;-webkit-appearance:none}
.calc-input:focus{border-color:rgba(232,201,106,0.45);box-shadow:0 0 18px rgba(232,201,106,0.07)}
.calc-input option{background:#0d0d1a;color:var(--text)}
.calc-btn{width:100%;padding:15px;background:linear-gradient(135deg,#e8c96a,#c9a84c);color:#0c0c18;border:none;border-radius:14px;font-weight:700;font-size:0.95rem;cursor:pointer;letter-spacing:0.1em;transition:all 0.3s;box-shadow:0 4px 18px rgba(232,201,106,0.22)}
.calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(232,201,106,0.38)}
.calc-res{margin-top:18px;padding:20px;background:rgba(232,201,106,0.04);border:1px solid rgba(232,201,106,0.1);border-radius:16px;font-size:0.85rem;line-height:2.1}
.calc-res strong{color:var(--gold)}
.calc-res .hl{color:var(--gold);font-size:1.3rem;font-weight:700}

/* 城市选择 */

.city-select option{background:#0d0d1a}

/* 日期输入 */
.date-input{width:100%;padding:13px 16px;background:rgba(6,6,14,0.85);border:1px solid rgba(232,201,106,0.1);border-radius:12px;color:var(--text);font-size:0.92rem;outline:none;transition:all 0.3s;cursor:pointer}

.date-input:focus{border-color:rgba(232,201,106,0.45)}

/* 天气预报 */
.weather-result{margin-top:16px;padding:20px;background:rgba(106,176,255,0.05);border:1px solid rgba(106,176,255,0.12);border-radius:18px}
.weather-now{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.weather-icon-big{font-size:3rem;line-height:1}
.weather-temp-big{font-size:2.5rem;font-weight:700;color:var(--text);line-height:1}
.weather-meta{font-size:0.78rem;color:var(--text2);line-height:1.8}
.weather-detail{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.weather-detail-item{text-align:center;padding:12px 8px;background:rgba(106,176,255,0.06);border-radius:12px}
.weather-detail-label{font-size:0.65rem;color:var(--text3);margin-bottom:4px}
.weather-detail-val{font-size:0.9rem;font-weight:600;color:var(--text)}
.weather-forecast{display:flex;gap:8px;margin-top:14px;overflow-x:auto;padding-bottom:4px}
.weather-forecast-item{flex-shrink:0;text-align:center;padding:12px 14px;background:rgba(255,255,255,0.03);border-radius:12px;min-width:70px}
.weather-forecast-item .wf-day{font-size:0.65rem;color:var(--text3);margin-bottom:6px}
.weather-forecast-item .wf-icon{font-size:1.4rem;margin-bottom:4px}
.weather-forecast-item .wf-temp{font-size:0.78rem;color:var(--text)}
.weather-loading{text-align:center;padding:30px;color:var(--text3);font-size:0.85rem}
.weather-error{text-align:center;padding:20px;color:var(--red);font-size:0.85rem}

/* 倒数日 */

.cd-big{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:700;color:var(--gold);line-height:1;margin-bottom:8px;text-shadow:0 0 30px rgba(232,201,106,0.3)}
.cd-label{font-size:0.82rem;color:var(--text2);margin-bottom:16px}
.cd-detail{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.cd-unit{text-align:center;min-width:64px}
.cd-num{font-size:1.8rem;font-weight:700;color:var(--text);line-height:1}
.cd-u-label{font-size:0.65rem;color:var(--text3);margin-top:4px}

.bmi-scale{display:flex;justify-content:space-between;font-size:0.65rem;color:var(--text3);margin-top:6px}

.oil-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax:125px,1fr));gap:12px;margin-top:4px}

/* 节气 */
.solar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:4px}

/* 壁纸 */
.wp-full{text-align:center}

/* 历史 */
.hist-modal{max-height:480px;overflow-y:auto}
.hist-item{padding:15px 0;border-bottom:1px solid rgba(232,201,106,0.06)}
.hist-y{font-size:0.68rem;font-weight:700;color:var(--blue);margin-bottom:5px;opacity:0.8}
.hist-t{font-size:0.88rem;line-height:1.65}

.poem-full{text-align:center;padding:10px 0}

(function(){

  const n=window.innerWidth<640?10:16;
  for(let i=0;i<n;i++){
    const d=document.createElement('div');d.className='drop';
    d.style.left=Math.random()*100+'%';
    d.style.animationDuration=(12+Math.random()*14)+'s';
    d.style.animationDelay=(-Math.random()*20)+'s';
    const sz=1.5+Math.random()*2;
    d.style.width=sz+'px';d.style.height=sz+'px';
    c.appendChild(d);
  }
})();

// ═══ 日期 + 天气 ═══
(function(){
  const n=new Date(),days=['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('dateDay').textContent=n.getDate();
  document.getElementById('dateWeekday').textContent=days[n.getDay()];
  document.getElementById('dateLunar').textContent='农历三月十九前后';
  // 默认查成都天气
  loadWeather('成都');
})();

// ═══ 天气预报（免费API） ═══
function loadWeather(city){
  const map={'北京':'101010100','上海':'101020100','广州':'101280101','深圳':'101280601','成都':'101270101','重庆':'101040100','杭州':'101210101','武汉':'101200101','西安':'101110101','南京':'101190101','天津':'101030100','苏州':'101190401','郑州':'101180101','长沙':'101250101','沈阳':'101070101','青岛':'101120201','大连':'101070201','厦门':'101230201','福州':'101230101','济南':'101120101'};
  const code=map[city]||map['成都'];
  fetch(`https://tianqi-api.com/api/v1/?version=v9&appid=0&appsecret=0&city=${encodeURIComponent(city)}&cityid=${code}`)
    .then(r=>r.json()).then(d=>{
      if(d&&d.data){
        document.getElementById('wCity').textContent=d.city;
        document.getElementById('wIcon').textContent=getWeatherEmoji(d.data.wea);
        document.getElementById('wTemp').textContent=d.data.tem+'°C';
      }
    }).catch(()=>{});
}
function getWeatherEmoji(wea){
  if(!wea)return'🌤️';
  if(wea.includes('晴'))return'☀️';
  if(wea.includes('阴'))return'☁️';
  if(wea.includes('雨'))return'🌧️';
  if(wea.includes('雪'))return'❄️';
  if(wea.includes('雾')||wea.includes('霾'))return'🌫️';
  if(wea.includes('雷'))return'⛈️';
  if(wea.includes('多云'))return'⛅';
  return'🌤️';
}

const FORTUNES=[

const FK='wf_v3';
let spinning=false;
function initFortune(){
  const today=new Date().toDateString();
  const s=localStorage.getItem(FK);
  if(s){
    const d=JSON.parse(s);
    if(d.date===today){
      document.getElementById('homeResult').textContent=d.r;
      document.getElementById('homeResult').style.color=d.c;
      document.getElementById('homeDesc').textContent=d.d;
      const btn=document.getElementById('homeBtn');
      if(btn){btn.textContent='今日已抽签 ✓';btn.disabled=true;}
      document.getElementById('homeTips').textContent='明天再来吧';
      return;
    }
  }
  document.getElementById('homeResult').textContent='转动轮盘';
  document.getElementById('homeResult').style.color='var(--text3)';
  document.getElementById('homeDesc').textContent='转动金色轮盘，看看今日命运如何安排';
  const btn=document.getElementById('homeBtn');
  if(btn){btn.textContent='开始抽签';btn.disabled=false;}
  document.getElementById('homeTips').textContent='每天一次，抽完明天再来';
}
function spinFortune(){
  if(spinning)return;
  const today=new Date().toDateString();
  const s=localStorage.getItem(FK);
  if(s&&JSON.parse(s).date===today)return;
  const wheel=document.getElementById('homeWheel');
  const btn=document.getElementById('homeBtn');
  const result=document.getElementById('homeResult');
  const desc=document.getElementById('homeDesc');
  if(!wheel||!btn)return;
  spinning=true;
  btn.disabled=true;btn.textContent='命运转盘中...';
  const deg=1800+Math.floor(Math.random()*1800);
  wheel.style.transition='transform 4.5s cubic-bezier(.2,.8,.3,1)';
  wheel.style.transform=`rotate(${deg}deg)`;
  wheel.classList.add('spinning');
  const segs=FORTUNES.length,sa=360/segs;
  setTimeout(()=>{
    const norm=((deg%360)+sa/2)%360;
    const fi=(segs-Math.floor(norm/sa))%segs;
    const f=FORTUNES[fi<0?0:fi];
    result.textContent=f.r;result.style.color=f.c;
    desc.textContent=f.d;
    btn.textContent='今日已抽签 ✓';
    document.getElementById('homeTips').textContent='明天再来吧';
    localStorage.setItem(FK,JSON.stringify({date:today,r:f.r,c:f.c,d:f.d}));
    spinning=false;
    wheel.classList.remove('spinning');
  },4600);
}
initFortune();

(function(){

  const n=new Date();
  const day=n.getDate();
  const month=n.getMonth()+1;
  // 每月固定的宜忌周期
  const goods=['嫁娶','出行','搬家','动土','开业','祭祀','祈福','订盟','纳采','会亲友'];
  const bads=['动土','破土','安葬','入宅','移徙','开市','斋醮'];
  // 用日期做伪随机，确保每天不同
  const seed=month*31+day;
  const shuffle=(arr)=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=(seed*(i+1))%a.length;[a[i],a[j]]=[a[j],a[i]]}return a;};
  const g=shuffle(goods).slice(0,4);
  const b=shuffle(bads).slice(0,2);

})();

function calcH(){return`<div class="calc-wrap">
  <div class="calc-row"><div class="calc-grp"><div class="calc-lbl">贷款金额（万元）</div><input class="calc-input" id="ca" type="number" value="100" min="1"></div>

  <div class="calc-grp"><div class="calc-lbl">贷款类型</div><select class="calc-input" id="ct"><option value="gjj">公积金贷款（3.1%）</option><option value="sd" selected>商业贷款（4.3%）</option><option value="mix">组合贷（各50%）</option></select></div>
  <div class="calc-row"><div class="calc-grp"><div class="calc-lbl">商贷利率（%）</div><input class="calc-input" id="cr" type="number" value="4.3" step="0.01"></div>
  <div class="calc-grp"><div class="calc-lbl">公积金利率（%）</div><input class="calc-input" id="cr2" type="number" value="3.1" step="0.01"></div></div>
  <button class="calc-btn" onclick="runCalc()">计算月供</button>
  <div class="calc-res" id="calcR">点击按钮计算月供详情</div>
</div>`;}
function runCalc(){
  const amt=parseFloat(document.getElementById('ca').value)*10000;
  const yrs=parseInt(document.getElementById('cy').value);
  const type=document.getElementById('ct').value;
  const r=parseFloat(document.getElementById('cr').value)/100;
  const r2=parseFloat(document.getElementById('cr2').value)/100;
  const mo=yrs*12;const fmt=n=>'¥'+Math.round(n).toLocaleString();
  let s='';
  if(type==='gjj'){
    const m=amt*(r2/12*Math.pow(1+r2/12,mo))/(Math.pow(1+r2/12,mo)-1);
    const t=m*mo,i=t-amt;
    s=`<strong>公积金贷款</strong><br>本金：${fmt(amt)} · ${yrs}年 · ${(r2*100).toFixed(2)}%<br><br><span class="hl">月供 ${fmt(m)}</span><br>总利息：${fmt(i)} · 共还：<strong>${fmt(t)}</strong>`;
  }else if(type==='sd'){
    const m=amt*(r/12*Math.pow(1+r/12,mo))/(Math.pow(1+r/12,mo)-1);
    const t=m*mo;
    s=`<strong>商业贷款</strong><br>本金：${fmt(amt)} · ${yrs}年 · ${(r*100).toFixed(2)}%<br><br><span class="hl">月供 ${fmt(m)}</span><br>总利息：${fmt(t-amt)} · 共还：<strong>${fmt(t)}</strong>`;
  }else{
    const h=amt/2;
    const m1=h*(r2/12*Math.pow(1+r2/12,mo))/(Math.pow(1+r2/12,mo)-1);
    const m2=h*(r/12*Math.pow(1+r/12,mo))/(Math.pow(1+r/12,mo)-1);
    const t=(m1+m2)*mo;
    s=`<strong>组合贷款</strong>（各50%）<br>本金：${fmt(amt)} · ${yrs}年<br><br>公积金：${fmt(h)} → ${fmt(m1)}/月<br>商　贷：${fmt(h)} → ${fmt(m2)}/月<br><br><span class="hl">合计月供 ${fmt(m1+m2)}</span><br>总利息：${fmt(t-amt)}`;
  }
  document.getElementById('calcR').innerHTML=s;
}

// ═══ 个税计算器（2024新税法） ═══
function taxH(){return`<div class="calc-wrap">
  <div class="calc-grp"><div class="calc-lbl">每月税前工资（元）</div><input class="calc-input" id="taxSalary" type="number" placeholder="8000" min="0"></div>
  <div class="calc-grp"><div class="calc-lbl">年终奖金额（元）</div><input class="calc-input" id="taxBonus" type="number" placeholder="0" min="0"></div>
  <div class="calc-grp"><div class="calc-lbl">专项附加扣除（月）</div><input class="calc-input" id="taxDeduct" type="number" placeholder="3000（房贷/子女教育等）" min="0" value="0"></div>
  <div class="calc-grp"><div class="calc-lbl">公积金/社保个人（月）</div><input class="calc-input" id="taxShebao" type="number" placeholder="0" min="0" value="0"></div>
  <button class="calc-btn" onclick="runTax()">计算个税</button>
  <div class="calc-res" id="taxR">点击按钮计算年度税务详情</div>
</div>`;}
function runTax(){
  const salary=parseFloat(document.getElementById('taxSalary').value)||0;
  const bonus=parseFloat(document.getElementById('taxBonus').value)||0;
  const deduct=parseFloat(document.getElementById('taxDeduct').value)||0;
  const shebao=parseFloat(document.getElementById('taxShebao').value)||0;
  const yearIncome=salary*12;
  // 起征点5000/月=60000/年
  const base=60000;
  const taxable=(yearIncome-base-deduct*12-shebao);
  const taxTable=[[36000,0.03,0],[144000,0.10,2520],[300000,0.20,16920],[420000,0.25,31920],[660000,0.30,52920],[960000,0.35,85920],[Infinity,0.45,181920]];
  let incomeTax=0;
  for(const [limit,rate,quickDeduct] of taxTable){
    if(taxable<=limit){incomeTax=taxable*rate-quickDeduct;break;}
  }
  incomeTax=Math.max(0,incomeTax);
  const monthlyTax=incomeTax/12;
  // 年终奖单独计税
  let bonusTax=0;
  if(bonus>0){
    const bpm=bonus/12;
    for(const [limit,rate,quickDeduct] of taxTable){
      if(bpm<=limit){bonusTax=bonus*rate-quickDeduct;break;}
    }
    bonusTax=Math.max(0,bonusTax);
  }
  const totalTax=incomeTax+bonusTax;
  const monthlyNet=(salary*(12)+bonus-totalTax)/12;
  const fmt=n=>'¥'+Math.round(n).toLocaleString();
  document.getElementById('taxR').innerHTML=`
    <strong>2024年个人所得税计算</strong><br>
    年薪合计：${fmt(yearIncome+bonus)}<br>
    专项附加扣除：${fmt(deduct*12)} · 社保公积金：${fmt(shebao*12)}<br>
    <br>💼 工资薪金个税：<strong>${fmt(incomeTax)}</strong><br>
    🎁 年终奖个税：<strong>${fmt(bonusTax)}</strong>（单独计税）<br>
    <br>合计年纳税：<span class="hl">${fmt(totalTax)}</span><br>
    <br>税后年收：<strong>${fmt(yearIncome+bonus-totalTax)}</strong><br>
    月均到手：<span class="hl">${fmt(monthlyNet)}</span><br>
    <div style="margin-top:12px;padding:10px;background:rgba(255,255,255,0.03);border-radius:10px;font-size:0.75rem;color:var(--text3);line-height:1.7">
      ※ 2024年个税税率表：≤3.6万 3% | ≤14.4万 10% | ≤30万 20% | ≤42万 25% | ≤66万 30% | ≤96万 35% | >96万 45%
    </div>`;
}

// ═══ 日期计算器 ═══
function dateH(){return`<div class="calc-wrap">
  <div class="calc-grp"><div class="calc-lbl">目标日期</div><input class="date-input" id="dateTarget" type="date" style="color-scheme:dark"></div>
  <div class="calc-grp"><div class="calc-lbl">对比日期（留空为今天）</div><input class="date-input" id="dateFrom" type="date" style="color-scheme:dark"></div>
  <div class="calc-grp"><div class="calc-lbl">计算方式</div><select class="calc-input" id="dateMode">
    <option value="countdown">倒计时（距离目标）</option>
    <option value="since">正计时（从某天算起）</option>
    <option value="diff">天数差</option>
    <option value="workday">工作日（不含周末）</option>
  </select></div>
  <button class="calc-btn" onclick="runDateCalc()">计算</button>
  <div class="countdown-display" id="dateResult" style="display:none">
    <div class="cd-big" id="cdBig"></div>
    <div class="cd-label" id="cdLabel"></div>
    <div class="cd-detail" id="cdDetail"></div>
  </div>
</div>`;}
function runDateCalc(){
  const target=document.getElementById('dateTarget').value;
  if(!target){alert('请选择目标日期');return;}
  const fromStr=document.getElementById('dateFrom').value;
  const from=fromStr?new Date(fromStr):new Date();
  const to=new Date(target);
  const mode=document.getElementById('dateMode').value;
  const diffMs=to-from;
  const totalDays=Math.round(diffMs/86400000);
  const absDays=Math.abs(totalDays);
  const result=document.getElementById('dateResult');
  const big=document.getElementById('cdBig');
  const label=document.getElementById('cdLabel');
  const detail=document.getElementById('cdDetail');
  result.style.display='block';
  if(mode==='countdown'){
    if(totalDays<0){
      big.textContent='已过';
      label.textContent=`距离 ${target}（过去 ${absDays} 天）`;
    }else{
      big.textContent=totalDays;
      label.textContent=`天`;
    }
    const d=Math.floor(totalDays/30.44),mo=Math.floor(d/12),yrs=Math.floor(d/12),rm=d%12;
    const w=Math.floor(totalDays/7);
    detail.innerHTML=`<div class="cd-unit"><div class="cd-num">${w}</div><div class="cd-u-label">周</div></div><div class="cd-unit"><div class="cd-num">${mo}</div><div class="cd-u-label">月</div></div><div class="cd-unit"><div class="cd-num">${yrs}</div><div class="cd-u-label">年</div></div>`;
  }else if(mode==='since'){
    big.textContent=absDays;
    label.textContent=`天`;
    detail.innerHTML=`<div class="cd-unit"><div class="cd-num">${Math.floor(absDays/7)}</div><div class="cd-u-label">周</div></div><div class="cd-unit"><div class="cd-num">${Math.floor(absDays/30.44)}</div><div class="cd-u-label">月</div></div>`;
  }else if(mode==='diff'){
    big.textContent=totalDays;
    label.textContent=`天（正数=之后，负数=之前）`;
    detail.innerHTML='';
  }else if(mode==='workday'){
    let workdays=0;
    const cur=new Date(from);
    const step=totalDays>=0?1:-1;
    while((step>0?cur<=to:cur>=to)){const d=cur.getDay();if(d!==0&&d!==6)workdays++;cur.setDate(cur.getDate()+step);if(Math.abs(cur-from)/86400000>730)break;}
    big.textContent=totalDays>=0?workdays:workdays;
    label.textContent=`工作日（不含周末）`;
    detail.innerHTML=`<div class="cd-unit"><div class="cd-num">${totalDays}</div><div class="cd-u-label">日历天</div></div><div class="cd-unit"><div class="cd-num">${totalDays-workdays}</div><div class="cd-u-label">周末</div></div>`;
  }
}

// ═══ 天气预报（模态框） ═══
function weatherH(){
  const cities=['北京','上海','广州','深圳','成都','重庆','杭州','武汉','西安','南京','天津','苏州','郑州','长沙','沈阳','青岛','大连','厦门','福州','济南'];
  const opts=cities.map(c=>`<option value="${c}">${c}</option>`).join('');
  return`<div class="calc-wrap">
  <div class="calc-grp"><div class="calc-lbl">选择城市</div><select class="city-select" id="wCitySel" onchange="loadWeatherModal()">${opts}</select></div>
  <div id="wResult"><div class="weather-loading">正在加载天气数据...</div></div>
</div>`;
}
function loadWeatherModal(){
  const city=document.getElementById('wCitySel')?.value||'成都';
  const el=document.getElementById('wResult');
  if(!el)return;
  el.innerHTML='<div class="weather-loading">正在加载天气数据...</div>';
  fetch(`https://tianqi-api.com/api/v1/?version=v9&appid=0&appsecret=0&city=${encodeURIComponent(city)}`)
    .then(r=>r.json()).then(d=>{
      if(!d||!d.data){
        el.innerHTML='<div class="weather-error">无法获取天气数据，请检查网络后重试</div>';return;
      }
      const w=d.data;
      el.innerHTML=`
        <div class="weather-result">
          <div class="weather-now">
            <span class="weather-icon-big">${getWeatherEmoji(w.wea)}</span>
            <div>
              <div class="weather-temp-big">${w.tem}°C</div>
              <div style="font-size:0.85rem;color:var(--text2)">${w.city} · ${w.wea} · ${w.win} ${w.win_speed}</div>
            </div>
          </div>
          <div class="weather-meta">
            <div>💧 湿度 ${w.humidity}</div>
            <div>气压 ${w.pressure}</div>
            <div>能见度 ${w.visibility}</div>
            <div>日出 ${w.sunrise || '—'} · 日落 ${w.sunset || '—'}</div>
          </div>
          ${w.days&&w.days.length>1?`<div class="weather-forecast">${w.days.slice(1,6).map(day=>`<div class="weather-forecast-item"><div class="wf-day">${day.day||day.date||''}</div><div class="wf-icon">${getWeatherEmoji(day.wea)}</div><div class="wf-temp">${day.tem_night}~${day.tem_day}°</div></div>`).join('')}</div>`:''}
        </div>`;
    }).catch(()=>{el.innerHTML='<div class="weather-error">网络错误，请稍后重试</div>';});
}

// ═══ 油价 ═══
function oilH(){return`<div class="oil-grid" id="oilM"></div><div class="oil-note">* 数据仅供参考，以当地加油站实际价格为准</div>`;}
function loadOilM(){
  const d=[{c:'北京',p:7.85},{c:'上海',p:7.82},{c:'广州',p:7.90},{c:'深圳',p:7.95},{c:'成都',p:7.78},{c:'重庆',p:7.88},{c:'武汉',p:7.80},{c:'西安',p:7.75}];
  const r=d.map(x=>({...x,p:+(x.p+(Math.random()*0.12-0.06)).toFixed(2)}));
  document.getElementById('oilM').innerHTML=r.map(x=>`<div class="oil-card"><div class="oil-c">${x.c}</div><div class="oil-p">¥${x.p.toFixed(2)}</div><div class="oil-u">元/升</div></div>`).join('');
}

// ═══ 节气 ═══
function solarH(){return`<div class="solar-grid" id="solarM"></div>`;}
function loadSolarM(){
  const terms=['小寒','大寒','立春','雨水','惊蛰','春分','清明','谷雨','立夏','小满','芒种','夏至','小暑','大暑','立秋','处暑','白露','秋分','寒露','霜降','立冬','小雪','大雪','冬至'];
  const n=new Date(),start=new Date(n.getFullYear(),0,1);
  const doy=Math.floor((n-start)/86400000)+1;
  const cur=Math.floor(doy/15.2)%24;
  const g=document.getElementById('solarM');
  if(g)g.innerHTML=terms.map((t,i)=>`<div class="solar-item${i===cur?' on':''}">${t}</div>`).join('');
}

// ═══ 历史 ═══
function histH(){return`<div class="hist-modal" id="histM"></div>`;}
function loadHistM(){
  const el=document.getElementById('histM');
  if(!el)return;
  if(window._allHist&&window._allHist.length){
    el.innerHTML=window._allHist.map(item=>`<div class="hist-item"><div class="hist-y">${item.year||'?'}年</div><div class="hist-t">${item.title||item.event||''}</div></div>`).join('');
  }else{el.innerHTML='<div style="padding:30px;text-align:center;color:var(--text3)">暂无数据</div>';}
}
